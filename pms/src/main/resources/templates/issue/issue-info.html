<!doctype html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org/"
	xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
	layout:decorate="~{common/layouts/default-layout}"
	layout:fragment="Content">
<head>
<meta charset="UTF-8" />
<!-- bootstrap-datepicker -->
<link rel="stylesheet" th:href="@{/css/issue/issueInfo.css}"/>
<link rel="stylesheet"
	href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap-datepicker/1.10.0/css/bootstrap-datepicker.min.css" />

<!-- 1. jQuery = JavaScript 라이브러리-->
<script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
<!-- 2. bootstrap-datepicker 본체 -->
<script
	src="https://cdnjs.cloudflare.com/ajax/libs/bootstrap-datepicker/1.10.0/js/bootstrap-datepicker.min.js"></script>
<!-- 3. 한국어 캘린더-->
<script
	src="https://cdnjs.cloudflare.com/ajax/libs/bootstrap-datepicker/1.10.0/locales/bootstrap-datepicker.ko.min.js"></script>
<title>일감 정보</title>
</head>
<body>
	<div class="container py-4">
		<div class="mb-4 mt-3 border-botton pb-3">
			<!-- #lists.isEmpty는 thymeleaf의 유틸함수 -->
			<h3 class="fw-bold">
				<span th:text="${issue.title}" class="text-primary"></span> <small
					class="text-muted">의 상세정보</small>
			</h3>
		</div>

		<div class="row mb-3">
			<!-- 상태 -->
			<div class="col-md-6 mb-3 mb-md-0">
				<label class="form-label fw-bold"> <i
					class="bi bi-info-circle me-1"></i>일감 상태
				</label>
				<div class="view-control shadow-sm" th:text="${issue.jobStatus}"></div>
			</div>
			<!-- 유형 -->
			<div class="col-md-6">
				<label class="form-label fw-bold">일감 유형</label>
				<div class="view-control shadow-sm" th:text="${issue.jobType}"></div>
			</div>
		</div>
		<!-- 상세 설명 -->
		<div class="mb-3">
			<label class="form-label fw-bold">상세 설명</label>
			<div class="view-control view-textarea shadow-sm"
				th:text="${issue.content}"></div>
		</div>

		<div class="row mb-3">
			<!-- 우선순위 -->
			<div class="col-md-6 mb-3 mb-md-0">
				<label class="form-label fw-bold">우선순위</label>
				<div class="view-control shadow-sm" th:text="${issue.priorityName}"></div>
			</div>
			<!-- 담당자 -->
			<div class="col-md-6">
				<label class="form-label fw-bold">담당자</label>
				<div class="view-control shadow-sm" th:text="${issue.username}"></div>
			</div>
		</div>

		<div class="row mb-3">
			<!-- 시작일 -->
			<div class="col-md-6">
				<label class="form-label fw-bold">시작일</label>
				<div class="view-control shadow-sm"
					th:text="${issue.startDate != null ? #dates.format(issue.startDate, 'yyyy-MM-dd') : '-'}"></div>
			</div>
			<!-- 마감일 -->
			<div class="col-md-6">
				<label class="form-label fw-bold">마감일</label>
				<div class="view-control shadow-sm"
					th:text="${issue.endDate != null ? #dates.format(issue.endDate, 'yyyy-MM-dd') : '-'}"></div>
			</div>
		</div>

		<div class="row mb-3">
			<!-- 상위일감 -->
			<div class="col-md-6">
				<label class="form-label fw-bold">상위 일감</label>
				<div class="view-control shadow-sm" th:text="${issue.title}"></div>
			</div>
			<!-- 진척도 -->
			<div class="col-md-6">
				<label class="form-label fw-bold">진척도</label>
				<div class="view-control shadow-sm bg-white"
					th:text="${issue.progress != null ? issue.progress + '%' : '0%'}"></div>
			</div>
		</div>

		<div class="row mb-3 align-items-center">
			<!-- 첨부파일 -->
			<div class="col-md-6">
				<label class="form-label">첨부파일</label> 
				<div class="border rounded p-3 bg-light shadow-sm">
					<div th:if="${#lists.isEmpty(fileList)}" 
							class="text-muted small py-2 text-center">
							첨부된 파일이 없습니다
					</div>
					<ul id="fileList" class="list-group list-group-flush m-0">
						<li th:each="file : ${fileList}"
						class="list-group-item d-flex justify-content-between align-items-center bg-transparent border-0 px-0 py-1">
							<div class="d-flex align-items-center">
								<a th:href="@{/download/{no}(no=${file.detailsNo})}"
									th:text="${file.filesName}"
									class="text-decoration-none text-dark small fw-bold-hover"></a>
							</div>							
						</li>
					</ul>			
				</div>
			</div>

			<!-- 공개범위 -->
			<div class="col-md-5 d-flex flex-column justify-content-center">
				<div class="d-flex gap-5">
				<label class="form-label fw-bold">공개 범위</label>
				
					<div class="form-check">
						<input class="form-check-input" 
								   type="radio"
								   name="publicRole"
								   id="public"
								   value="1"
								   th:checked="${issue.publicRole == '1'}"
								   disabled
								  />
						<label class="form-check-label" for="public">전체공개</label>
					</div>

					<div class="form-check">
						<input class="form-check-input" 
								   type="radio"
								   name="publicRole"
								   id="private" 
								   value=""
								   th:checked="${issue.publicRole == '0'}" 
								   disabled/>
						<label class="form-check-label" for="private">일부공개</label>
					</div>
				</div>

			</div>
		</div>
	</div>
	<div class="mt-3 mb-5">
		<div class="d-flex justify-content-end">
			<a
				th:href="@{/project/user/{projectCode}/issue/list(projectCode=${projectCode})}"
				class="btn btn-primary">돌아가기</a>
		</div>
	</div>

	<!-- form 태그 바깥 부가 기능 영역 Card영역 -->
	<!-- 수정이력 Card -->
	<div class="card history-card">
		<div class="card-header history-header">
			<h5 class="mb-0 fw-bold">수정 이력</h5>
		</div>
		<div class="card-body p-0">
				<div id="subContentArea" class="table-responsive history-scroll">
					<table class="table table-hover align-middle mb-0 history-table">
						<thead>
							<tr>
								<th style="width: 15%;">수정한 사람</th>
								<th style="width: 60%;">수정 사유</th>
								<th style="width: 25%;">수정 일시</th>
							</tr>
						</thead>
						<tbody>
							<tr th:each="history : ${historyList}">
								<td th:text="${history.username}"></td>
								<td th:text="${history.changeComment}"></td>
								<td th:text="${#dates.format(history.historyDate, 'yyyy-MM-dd')}"></td>
							</tr>
							<!-- 수정 이력이 없으면 -->
							<tr th:if="${#lists.isEmpty(historyList)}">
								<td colspan="3" class="text-center text-muted py-4">수정 이력이 없습니다</td>
							</tr>
						</tbody>
					</table>
				</div>	
		</div>
	</div>

</body>
</html>
