<!doctype html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org/"
	xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
	layout:decorate="~{common/layouts/default-layout}"
	layout:fragment="Content">
<head>
<meta charset="UTF-8" />
<!-- bootstrap-datepicker -->
<link rel="stylesheet"
	href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap-datepicker/1.10.0/css/bootstrap-datepicker.min.css" />

<!-- 1. jQuery = JavaScript 라이브러리-->
<script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
<!-- 2. bootstrap-datepicker 본체 -->
<script
	src="https://cdnjs.cloudflare.com/ajax/libs/bootstrap-datepicker/1.10.0/js/bootstrap-datepicker.min.js"></script>
<!-- 3. 한국어 캘린더-->
<script
	src="https://cdnjs.cloudflare.com/ajax/libs/bootstrap-datepicker/1.10.0/locales/bootstrap-datepicker.ko.min.js"></script>
<title>일감 정보</title>
</head>
<body>
	<div class="container py-4">
    <div class="mb-4 mt-3 border-bottom pb-3">
        <h3 class="fw-bold d-flex align-items-center">
            <span class="badge bg-primary me-2" th:text="${issue.jobType}">일감 유형</span>
            <span th:text="${issue.title}" class="text-primary me-2"></span>
            <small class="text-muted fs-6">의 상세정보</small>
        </h3>
    </div>
 <!-- 상세정보 card -->
    <div class="card shadow-sm border-0 mb-4 bg-body">
        <div class="card-body p-4">
            <div class="row g-4 mb-4">
                <div class="col-md-6">
                    <label class="form-label fw-bold text-secondary small">일감 상태</label>
                    <div class="p-2 rounded bg-body-tertiary border shadow-sm" th:text="${issue.jobStatus}"></div>
                </div>
                <div class="col-md-6">
                    <label class="form-label fw-bold text-secondary small">우선순위</label>
                    <div class="p-2 rounded bg-body-tertiary border shadow-sm" th:text="${issue.priorityName}"></div>
                </div>
            </div>

            <div class="mb-4">
                <label class="form-label fw-bold text-secondary small">상세 설명</label>
                <div class="p-3 rounded bg-body-tertiary border min-vh-25 shadow-sm" 
                     style="white-space: pre-wrap; min-height: 120px;" 
                     th:text="${issue.content}"></div>
            </div>

            <div class="row g-4 mb-4">
                <div class="col-md-6">
                    <label class="form-label fw-bold text-secondary small">담당자</label>
                    <div class="p-2 rounded bg-body-tertiary border d-flex align-items-center shadow-sm">
                        <span th:text="${issue.username}"></span>
                    </div>
                </div>
                <div class="col-md-6">
                    <label class="form-label fw-bold text-secondary small">진척도</label>
                    <div class="d-flex align-items-center gap-3">
                        <div class="progress flex-grow-1 shadow-sm" style="height: 10px;">
                            <div class="progress-bar bg-primary" role="progressbar" 
                                 th:style="'width: ' + (${issue.progress != null ? issue.progress : 0}) + '%'"></div>
                        </div>
                        <span class="fw-bold" th:text="${issue.progress != null ? issue.progress + '%' : '0%'}"></span>
                    </div>
                </div>
            </div>

            <div class="row g-4 mb-4">
                <div class="col-md-6">
                    <label class="form-label fw-bold text-secondary small">시작일</label>
                    <div class="p-2 rounded bg-body-tertiary border shadow-sm"
                         th:text="${issue.startDate != null ? #dates.format(issue.startDate, 'yyyy-MM-dd') : '-'}"></div>
                </div>
                <div class="col-md-6">
                    <label class="form-label fw-bold text-secondary small shadow-sm">마감일</label>
                    <div class="p-2 rounded bg-body-tertiary border"
                         th:text="${issue.endDate != null ? #dates.format(issue.endDate, 'yyyy-MM-dd') : '-'}"></div>
                </div>
            </div>

            <div class="row g-4">
                <div class="col-md-6">
                    <label class="form-label fw-bold text-secondary small">첨부파일</label> 
                    <div class="bg-body-tertiary rounded p-2 border shadow-sm">
                        <div th:if="${#lists.isEmpty(fileList)}" class="text-muted small py-1 text-center">
                            첨부된 파일이 없습니다
                        </div>
                        <ul class="list-unstyled m-0">
                            <li th:each="file : ${fileList}" class="py-1">
                                <a th:href="@{/download/{no}(no=${file.detailsNo})}"
                                   class="text-decoration-none small d-flex align-items-center">
                                    <span class="me-2">📎</span>
                                    <span th:text="${file.filesName}" class="link-primary"></span>
                                </a>
                            </li>
                        </ul>
                    </div>
                </div>
                <div class="col-md-6">
                    <label class="form-label fw-bold text-secondary small">공개 범위</label>
                    <div class="p-2 d-flex gap-4 bg-body-tertiary rounded border shadow-sm">
                        <div class="form-check m-0">
                            <input class="form-check-input" type="radio" th:checked="${issue.publicRole == '1'}" disabled />
                            <label class="form-check-label opacity-100 small">전체공개</label>
                        </div>
                        <div class="form-check m-0">
                            <input class="form-check-input" type="radio" th:checked="${issue.publicRole == '0'}" disabled/>
                            <label class="form-check-label opacity-100 small">일부공개</label>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
	<!-- 돌아가기 버튼 -->
	<div class="mt-3 mb-5">
		<div class="d-flex justify-content-end">
			<a th:href="@{/project/user/{projectCode}/issue/list/read(projectCode=${projectCode})}"
				 class="btn btn-primary">돌아가기</a>
		</div>
	</div>
	<!-- 수정이력 Card -->
	<div class="card history-card">
				<div id="subContentArea" class="table-responsive history-scroll">
				<div class="card-header d-flex align-items-center" style="background-color: transparent; border-bottom: 1px solid rgba(0,0,0,0.125);">
       			 	<h5 class="card-title mb-0" style="font-weight: 600; font-size: 1rem;">
           		 		<i class="cil-history me-2"></i>수정이력
    			</h5>
    			</div>
					<table class="table table-hover align-middle mb-0 history-table">
						<thead>
							<tr>
								<th style="width: 15%;">수정한 사람</th>
								<th style="width: 60%;">수정 사유</th>
								<th style="width: 25%;">수정 일시</th>
							</tr>
						</thead>
						<tbody>
							<tr th:each="history : ${historyList}">
								<td th:text="${history.username}"></td>
								<td th:text="${history.changeComment}"></td>
								<td th:text="${#dates.format(history.historyDate, 'yyyy-MM-dd')}"></td>
							</tr>
							<!-- 수정 이력이 없으면 -->
							<tr th:if="${#lists.isEmpty(historyList)}">
								<td colspan="3" class="text-center text-muted py-4">수정 이력이 없습니다</td>
							</tr>
						</tbody>
					</table>
				</div>	
		</div>
</body>
</html>
