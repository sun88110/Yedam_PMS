<!doctype html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org/"
	xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
	layout:decorate="~{common/layouts/default-layout}"
	layout:fragment="Content">
<head>
<!-- Bootstrap5 icon사용 -->
<link rel="stylesheet"
	href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" />
<link rel="stylesheet"
	href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap-datepicker/1.10.0/css/bootstrap-datepicker.min.css" />

<!-- 1. jQuery = JavaScript 라이브러리-->
<script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
<!-- 2. bootstrap-datepicker 본체 -->
<script
	src="https://cdnjs.cloudflare.com/ajax/libs/bootstrap-datepicker/1.10.0/js/bootstrap-datepicker.min.js"></script>
<!-- 3. 한국어 캘린더-->
<script
	src="https://cdnjs.cloudflare.com/ajax/libs/bootstrap-datepicker/1.10.0/locales/bootstrap-datepicker.ko.min.js"></script>
<meta charset="UTF-8" />
<title>일감 전체 조회</title>
</head>
<body>
	<div class="container">
		<div class="mb-4 mt-3">
			<!-- #lists.isEmpty는 thymeleaf의 유틸함수 -->
			<h3 class="fw-bold">
				<label th:if="${not #lists.isEmpty(issueList)}"
					th:text="${projectCode}" class="text-primary"></label>
				<small class="text-muted">의 일감 조회</small>
			</h3>
		</div>

		<!-- 검색 조건-->
		<form
			th:action="@{/project/user/{projectCode}/issue/list(projectCode=${projectCode})}"
			method="get" id="searchForm">
			<div id="dynamicSearch" class="row g-3 mb-3">
				<div
					th:replace="~{common/fragments/issue/dynamic-issue-list-search}"></div>
			</div>

			<!-- 검색조건 추가 버튼 + 조회 버튼 -->
			<div
				class="mb-3 d-flex align-items-stretch justify-content-end gap-2">
				<div class="dropdown me-2">
					<button class="btn btn-secondary dropdown-toggle" type="button"
						data-bs-toggle="dropdown">검색조건 추가</button>
					<ul class="dropdown-menu">
						<li><a class="dropdown-item add-condition"
							data-target="field-jobNo" href="#">일감번호</a></li>
						<li><a class="dropdown-item add-condition"
							data-target="field-jobtitle" href="#">제목</a></li>
						<li><a class="dropdown-item add-condition"
							data-target="field-jobStatus" href="#">상태</a></li>
						<li><a class="dropdown-item add-condition"
							data-target="field-jobType" href="#">유형</a></li>
						<li><a class="dropdown-item add-condition"
							data-target="field-priority" href="#">우선순위</a></li>
						<li><a class="dropdown-item add-condition"
							data-target="field-managerId" href="#">담당자</a></li>
						<li><a class="dropdown-item add-condition"
							data-target="field-startDate" href="#">일감 시작날짜</a></li>
						<li><a class="dropdown-item add-condition"
							data-target="field-endDate" href="#">일감 마감날짜</a></li>
						<li><a class="dropdown-item add-condition"
							data-target="field-progress" href="#">진척도</a></li>
					</ul>
				</div>
				<!-- 조회버튼 -->
				<button type="submit" class="btn btn-primary">일감 조회</button>
				<!--  소요시간 조회로 이동 -->
				<a
					th:href="@{/project/user/{projectCode}/work/list(projectCode=${projectCode})}"
					class="btn btn-primary text-white d-inline-flex">소요시간 조회</a>
				<!-- 일감 등록으로 이동 -->
				<a
					th:href="@{/project/user/{projectCode}/issue/new(projectCode=${projectCode})}"
					class="btn btn-success text-white d-inline-flex">일감 등록</a>
			</div>
		</form>
		<!-- 일감 전체 조회되는 테이블-->
		<table class="table table-hover text-center">
			<thead class="table-light">
				<tr>
					<th>프로젝트 명</th>
					<th><i class="bi bi-hash me-1"></i>일감번호</th>
					<th><i class="bi bi-card-text me-1"></i>제목</th>
					<th><i class="bi bi-tags me-1"></i>상태</th>
					<th>유형</th>
					<th>우선순위</th>
					<th><i class="bi bi-person-badge me-1"></i>담당자</th>
					<!-- 수정하기 버튼/ 상세조회 버튼 -->
					<th><i class="bi bi-gear me-1"></i>수정/상세</th>
				</tr>
			</thead>
			<tbody>
				<tr th:each="issue : ${issueList}">
					<td th:text="${issue.projectName}"
						th:data-project-code="${issue.projectCode}"></td>
					<td th:text="${issue.jobNo}"></td>
					<td th:text="${issue.title}"></td>
					<td th:text="${issue.jobStatus}"
						th:data-job-status-no="${issue.jobStatusNo}"></td>
					<td th:text="${issue.jobType}"
						th:data-job-type-no="${issue.jobTypeNo}"></td>
					<td th:text="${issue.priority}"
						th:data-priority="${issue.priority}"></td>
					<td th:text="${issue.managerId}"></td>
					<td>
						<div class="btn-group" role="group">
							<a th:href="@{/project/user/{projectCode}issue/info(projectCode=${projectCode}, jobNo=${issue.jobNo})}"
								class="btn btn-sm btn-outline-info">상세</a> <a
								class="btn btn-sm btn-outline-info">수정</a>
						</div>
					</td>
				</tr>
			</tbody>
		</table>
	</div>

	<script th:src="@{/js/issue/dynamicSearch.js}"></script>
</body>
</html>
