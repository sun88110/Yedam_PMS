<html
  lang="ko"
  xmlns:th="https://www.thymeleaf.org/"
  xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
  layout:decorate="~{common/layouts/default-layout}"
  layout:fragment="Content"
>
  <div class="mb-2">
    <!--/* row-header */-->
    <div class="d-flex justify-content-between align-items-center mb-5">
      <div class="d-flex align-items-center">
        <div class="position-relative">
          <h2 class="fw-bold m-0 text-dark" 
                th:text="프로젝트"></h2>
        </div>
      </div>
      <!--/* pm/admin Only */-->
      <!--/* ProjectAdmin buttons : add-project, modify-project */-->
      <div class="d-flex align-items-center gap-4">
        <div th:if="${pm or admin}"  class="d-flex align-items-center gap-2">
          <i class="cil-plus text-dark" style="font-size: 1.5rem; font-weight: bold"></i>
			<button type="button"
			        id="btnAddNewProject" 
			        class="btn btn-dark fw-bold" 
			        th:data-url="@{/project/create}">
			    새 프로젝트
			</button>
        </div>

        <div th:if="${admin}" class="d-flex align-items-center gap-2">
          <i class="cil-settings text-secondary" style="font-size: 1.5rem"></i>
          <button class="btn btn-primary fw-bold" name="btnSettings" th:data-url="@{/settings/}">관리</button>
        </div>
      </div>
    </div>

    <!--/* search-menu */-->
	<form method="get" th:action="@{/project/read}" th:object="${searchDTO}" class="card bg-transparent shadow-none border-0">
	  <div class="card-body py-4 px-0 d-flex flex-wrap justify-content-between align-items-center gap-3">
	    
	    <div class="d-flex flex-wrap gap-2" style="flex: 1">
	      <input type="text" class="form-control" placeholder="프로젝트명" th:field="*{projectName}" style="max-width: 150px" />
	      
	      <select class="form-select" th:field="*{projectStatus}" style="max-width: 130px">
	        <option value="" selected>상태 (전체)</option>
	        <option th:each="common : ${commons}" th:value="${common.commonNo}" th:text="${common.commonName}"></option>
	      </select>
	      
	      <select class="form-select" th:field="*{projectAssignee}" style="max-width: 160px">
		    <option value="" selected>담당자 (전체)</option>
		    <option th:each="name : ${assignees}" th:value="${name}" th:text="${name}"></option>
		  </select>
	
	      <div class="input-group input-group-sm ms-2" style="max-width: 350px;">
	          <span class="input-group-text"><i class="cil-calendar me-1"></i> 기간</span>
	          <input type="date" class="form-control" th:field="*{startDate}" />
	          <span class="input-group-text">~</span>
	          <input type="date" class="form-control" th:field="*{endDate}" />
	      </div>
	    </div>
	
	    <div class="d-flex align-items-center gap-2">
	      <button type="submit" class="btn btn-primary px-4 fw-bold">
	        <i class="cil-search me-1"></i> 조회
	      </button>
	    <a th:href="@{/project/read}" class="btn btn-outline-secondary px-3 fw-bold">
    		<i class="cil-reload me-1"></i> 초기화
  		</a>
	    </div>
	    
	  </div>
	</form>
  </div>
  <!--/* Card */-->
<div class="card mb-4 shadow-sm" th:each="project : ${projects}" th:if="${project.parentProjectNo == null or project.parentProjectNo == 0}">
    <div class="card-body">
        <div class="d-flex justify-content-between align-items-start">
            
            <div class="project-info" style="flex: 1;">
                <div class="d-flex align-items-center gap-2 mb-1">
                    <h5 class="fw-bold text-primary mb-0">
                        <a th:text="${project.projectName}" 
                           th:href="@{/project/user/{code}/read(code=${project.projectCode})}" 
                           class="text-decoration-none"></a>
                    </h5>
                    <i th:if="${project.isPm}" class="cil-user" style="font-size: 1.2rem;"></i>
                    <span th:if="${project.publicYn == 1}" class="badge bg-info-light text-info small" style="font-size: 0.7rem;">Public</span>
                </div>
                <p class="text-muted small mb-3" th:text="${project.projectDesc}"></p>

                <div class="mt-2">
                    <th:block th:replace="~{::recursiveTree(parentNo=${project.projectNo}, allProjects=${projects})}"></th:block>
                </div>
            </div>

            <div class="project-stats d-flex gap-5 text-end ms-4" th:if="${project.projectTotalDTO != null}">
                <div class="stat-item">
                    <div class="small text-secondary">일감 수 <span class="text-success fw-bold fs-4" th:text="${project.projectTotalDTO.totalJobCount}">0</span>개</div>
                    <div class="text-muted" style="font-size: 0.75rem;" th:text="${project.latestJobTitle ?: '일감 없음'}"></div>
                </div>
                <div class="stat-item">
                    <div class="small text-secondary">참여 인원 <span class="text-warning fw-bold fs-4" th:text="${project.projectTotalDTO.totalMemberCount}">0</span>명</div>
                    <div class="text-muted" style="font-size: 0.75rem;" th:text="${project.projectHome ?: '-'}"></div>
                </div>
                <div class="stat-item" style="min-width: 140px;">
                    <div class="small text-secondary">진행률 <span class="text-danger fw-bold fs-5" th:text="${project.projectTotalDTO.currentProgress + '%'}"></span></div>
                    <div class="progress" style="height: 5px; margin-top: 4px;">
                        <div class="progress-bar bg-danger" th:style="'width:' + ${project.projectTotalDTO.currentProgress} + '%'"></div>
                    </div>
                    <div class="text-muted mt-1" style="font-size: 0.7rem;">목표: <span th:text="${project.projectTotalDTO.targetProgress + '%'}"></span></div>
                </div>
            </div>
        </div>
    </div>
</div>

<th:block th:fragment="recursiveTree(parentNo, allProjects)">
    <div th:each="sub : ${allProjects}" th:if="${sub.parentProjectNo == parentNo}" 
         class="border-start border-secondary border-4 ms-3 ps-3 mb-0"> <div class="d-flex align-items-center gap-2">
            <h6 class="fw-bold text-primary mb-0">
                <a th:href="@{/project/user/{code}/read(code=${sub.projectCode})}" 
                   th:text="${sub.projectName}" class="text-decoration-none"></a>
            </h6>
            <i th:if="${sub.isPm}" class="cil-user" style="font-size: 1.2rem;"></i>
            <span th:if="${sub.publicYn == 1}" class="badge bg-info-light text-info small" style="font-size: 0.65rem;">Public</span>
        </div>
        <p class="text-muted mb-0" style="font-size: 0.85rem;" th:text="${sub.projectDesc}"></p>
        
        <th:block th:replace="~{::recursiveTree(parentNo=${sub.projectNo}, allProjects=${allProjects})}"></th:block>
    </div>
</th:block>
<!--/* Toast Tag */-->
<div class="toast-container position-fixed bottom-0 end-0 p-3">
    <div th:if="${successMessage != null or errorMessage != null}" 
         id="liveToast" 
         class="toast hide" 
         role="alert" aria-live="assertive" aria-atomic="true">
        
        <div class="toast-header text-white" 
             th:classappend="${successMessage != null} ? 'bg-success' : 'bg-danger'">
            <strong class="me-auto" th:text="${successMessage != null} ? '성공' : '오류'">알림</strong>
            <button type="button" class="btn-close btn-close-white" data-coreui-dismiss="toast" aria-label="Close"></button>
        </div>
        
        <div class="toast-body" th:text="${successMessage ?: errorMessage}">
            </div>
    </div>
</div>
<!--/* Toast Script */-->
<script th:if="${successMessage != null or errorMessage != null}">
    document.addEventListener('DOMContentLoaded', function () {
        const toastElement = document.getElementById('liveToast');
        if (toastElement) {
            const toast = new coreui.Toast(toastElement);
            toast.show();
        }
    });
</script>
<!--/* jQuery */-->
<script src="https://code.jquery.com/jquery-4.0.0.js" integrity="sha256-9fsHeVnKBvqh3FB2HYu7g2xseAZ5MlN6Kz/qnkASV8U=" crossorigin="anonymous"></script>

<script>
	$(document).ready(function() {
	    $('[data-url]').on('click', function() {
	        location.href = $(this).data('url');
	    });
	});
	$(document).ready(function() {
	    // 검색 폼 전송 가로채기
	    $('form[action="/project/read"]').on('submit', function(e) {
	        // 폼 안의 모든 input, select 요소를 순회
	        $(this).find('input, select').each(function() {
	            // 값이 비어있다면 (빈 문자열)
	            if ($(this).val() === '') {
	                // 해당 입력 필드를 비활성화 (서버로 전송되지 않음)
	                $(this).prop('disabled', true); 
	            }
	        });
	    });
	});
</script>
</html>
