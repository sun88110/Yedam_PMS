<!DOCTYPE html>
<html lang="ko" xmlns:th="https://www.thymeleaf.org/"
	xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
	layout:decorate="~{common/layouts/full-default-layout}"
	layout:fragment="Content">
<head>
<meta charset="UTF-8">
<title>PMS Project</title>
<style>
.gantt-wrapper {
	/* 100vh = 100% of the viewport height. 120px is an estimate for header/padding. Adjust if needed. */
	height: calc(100vh - 120px);
	width: 100%;
}
/* The gantt container itself should fill its wrapper */
#gantt_here {
	height: 100%;
	width: 100%;
}

/* 입력 버튼 헤더 css 수정 */
.gantt_grid_head_add::before {
	display: none !important;
	content: "" !important;
}

.gantt_grid_head_add {
	cursor: default !important; /* 손가락 모양(pointer)을 기본 화살표로 변경 */
	opacity: 1 !important; /* 흐릿한 효과 제거 */
}
/* 그리드 헤더 셀 디자인 수정 */
.gantt_grid_head_cell {
	line-height: center; /* 헤더 높이에 맞춘 세로 중앙 정렬 */
}

.gantt_grid_head_cell, .gantt_cell, .gantt_scale_cell, .gantt_task_cell {
    border-right: 1px solid #d9d9d9 !important; 
}

.gantt_grid_head_cell, .gantt_scale_cell {
    font-size: 1rem !important;
}
</style>
<link th:href="@{/dhtmlx/gantt/dhtmlxgantt.css}" rel="stylesheet">
<script th:src="@{/dhtmlx/gantt/dhtmlxgantt.js}"></script> 
<!-- <script src="https://cdn.dhtmlx.com/gantt/edge/dhtmlxgantt.js"></script> -->
<!-- <script src="https://cdn.dhtmlx.com/gantt/edge/locales/locale_kr.js"></script> -->
</head>
<body>
	<div class="gantt-wrapper">
		<div id="gantt_here"></div>
	</div>
	
	
	<div class="modal fade" id="ganttCustomModal" tabindex="-1" aria-labelledby="ganttModalLabel" aria-hidden="true" style="z-index: 1055;">
        <div class="modal-dialog modal-lg">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title" id="ganttModalLabel">새 일감 등록</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <div class="modal-body">
                    <th:block th:replace="~{common/fragments/project/issue-form-fragment :: IssueForm}"></th:block>
                </div>
            </div>
        </div>
    </div>

    <th:block th:replace="~{common/fragments/issue/user-select-modal :: UserSelectModal}"></th:block>
    <th:block th:replace="~{common/fragments/issue/issue-select-modal :: IssueSelectModal}"></th:block>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap-datepicker/1.10.0/css/bootstrap-datepicker.min.css" />
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/bootstrap-datepicker/1.10.0/js/bootstrap-datepicker.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/bootstrap-datepicker/1.10.0/locales/bootstrap-datepicker.ko.min.js"></script>
	
	<script th:inline="javascript">
    let ganttIssueModal;
    let currentTaskInfo = null;
    let holidaySet = new Set();

    const projectCode = /*[[${projectCode}]]*/ null;
    const init_url   = /*[[@{/project/user/{code}/issue/gantt/data/read(code=${projectCode})}]]*/ '/';
    const add_url    = /*[[@{/project/user/{code}/issue/gantt/create(code=${projectCode})}]]*/ '/';
    const update_url = /*[[@{/project/user/{code}/issue/gantt/update(code=${projectCode})}]]*/ '/';

    gantt.plugins({
        marker: true,
        worktime: true
    });

    // ==========================================
    // 유틸: 날짜 문자열 → 로컬 Date 객체 파싱
    // ISO 형식("2026-02-24T15:00:00.000+00:00") → KST 보정 +1일
    // 일반 형식("2026-02-25") → 그대로 파싱
    // ==========================================
    function parseDate(str) {
        if (!str) return null;
        if (str.includes('T')) {
            const parts = str.substring(0, 10).split("-");
            return new Date(parts[0], parts[1] - 1, parseInt(parts[2]) + 1);
        }
        const parts = str.split("-");
        if (parts[0].length === 4) return new Date(parts[0], parts[1] - 1, parts[2]);
        return new Date(parts[2], parts[1] - 1, parts[0]);
    }

    // ==========================================
    // 유틸: savedTask(서버응답) + 계산값 → Gantt task 필드 객체 생성
    // 신규/수정 양쪽에서 공통으로 사용
    // ==========================================
    function buildTaskFields(savedTask, startDateObj, exclusiveEndObj, calcDuration, managerName, priorityName) {
        return {
            text:          savedTask.title,
            start_date:    startDateObj,
            end_date:      exclusiveEndObj,
            duration:      calcDuration,
            description:   savedTask.content || "",
            workerName:    managerName,
            jobPriority:   priorityName,
            progress:      parseFloat(document.getElementById('progressSelect').value) / 100,
            publicRole:    savedTask.publicRole,
            jobStatusNo:   parseInt(savedTask.jobStatusNo),
            job_status_no: parseInt(savedTask.jobStatusNo),
            jobTypeNo:     parseInt(savedTask.jobTypeNo),
            job_type_no:   parseInt(savedTask.jobTypeNo),
            filesNo:       savedTask.filesNo
        };
    }

    function initGanttUI() {
        gantt.i18n.setLocale("kr");
        gantt.setSkin("meadow");
        gantt.config.date_format = "%d-%m-%Y";

        gantt.config.grid_header_height = 60;
        gantt.config.scale_height = 60;

        gantt.config.grid_resize = true;
        gantt.config.keep_grid_width = false;
        gantt.config.drag_progress = false;

        gantt.config.work_time = true;
        gantt.config.correct_work_time = true;
        gantt.config.skip_off_time = true;
        gantt.config.drag_links = false;
        gantt.message.position = "bottom"; 
        
        gantt.config.columns = [
            { name: "text",        label: "작업명",   tree: true, width: "*", min_width: 150, resize: true },
            { name: "start_date",  label: "시작일",   width: "*", min_width: 90, align: "center", resize: true },
            { name: "end_date",    label: "종료일",   width: "*", min_width: 90, align: "center", resize: true },
            { name: "workerName",  label: "담당자",   align: "center", width: 80, resize: true },
            { name: "jobPriority", label: "우선순위", align: "center", width: 70, resize: true },
            { name: "add",         label: "추가",     width: 44 }
        ];

        gantt.config.scales = [
            { unit: "month", step: 1, format: "%Y년 %n월" },
            { unit: "day",   step: 1, format: "%d일(%D)" }
        ];

        // 종료일 컬럼 표시: 내부 exclusive end_date에서 -1ms → 사용자 기준 inclusive 날짜 표시
        gantt.templates.grid_date_format = function(date, column) {
            const fmt = gantt.date.date_to_str("%Y-%m-%d");
            if (column === "end_date") {
                return fmt(new Date(date.valueOf() - 1));
            }
            return fmt(date);
        };

        // 휴일/주말을 간트 타임라인에서 숨김
        gantt.ignore_time = function(date) {
            const yyyy = date.getFullYear();
            const mm   = String(date.getMonth() + 1).padStart(2, '0');
            const dd   = String(date.getDate()).padStart(2, '0');
            return holidaySet.has(`${yyyy}-${mm}-${dd}`);
        };

        // 헤더 '추가' 클릭 시 더미 task 생성 방지
        gantt.attachEvent("onGridHeaderClick", function(name) {
            return name !== "add";
        });

        // 프로젝트 행(p로 시작) 더블클릭 시 모달 차단
        gantt.attachEvent("onTaskDblClick", function(id) {
            return !String(id).startsWith("p");
        });

        // 기본 lightbox 대신 커스텀 부트스트랩 모달
        gantt.attachEvent("onBeforeLightbox", function(id) {
            currentTaskInfo = gantt.getTask(id);

            if (!ganttIssueModal) {
                ganttIssueModal = new bootstrap.Modal(document.getElementById('ganttCustomModal'));
            }

            document.getElementById('issueInsert').reset();

            const hiddenJobNo       = document.getElementById('hiddenJobNo');
            const changeCommentDiv  = document.getElementById('changeCommentDiv');
            const modalTitle        = document.getElementById('ganttModalLabel');
            const progressSelect    = document.getElementById('progressSelect');
            const hiddenProjectNo   = document.getElementById('hiddenProjectNo');
            const hiddenParentJobNo = document.getElementById('hiddenParentJobNo');
            const startDateInput    = document.getElementById('startDate');
            const endDateInput      = document.getElementById('endDate');

            // 첨부파일 UI 초기화 및 비동기 로드
            const fileUl = document.getElementById('modalFileList');
            const noFileMsg = document.getElementById('noFileMessage');
            const deleteContainer = document.getElementById('deleteFilesContainer');

            fileUl.innerHTML = '';
            deleteContainer.innerHTML = '';
            noFileMsg.style.display = 'none';
            
            // 첨부파일 목록정보 세팅
            const currentFilesNo = currentTaskInfo.filesNo;
            
            // 숨김 필드 세팅 (부모가 프로젝트인지 일감인지 분기)
            const rawParentId = String(currentTaskInfo.parent);
            if (rawParentId.startsWith("p")) {
                hiddenProjectNo.value   = rawParentId.replace("p", "");
                hiddenParentJobNo.value = "";
            } else if (rawParentId.startsWith("j")) {
                hiddenParentJobNo.value = rawParentId.replace("j", "");
                const parentTask = gantt.getTask(rawParentId);
                hiddenProjectNo.value   = (parentTask.project_id || "").replace("p", "");
            } else {
                hiddenProjectNo.value = projectCode;
            }

            // 날짜 세팅: 내부 end_date(exclusive) → input 표시용 inclusive(-1일)
            const startStr = currentTaskInfo.start_date
                ? gantt.date.date_to_str("%Y-%m-%d")(currentTaskInfo.start_date)
                : "";
            let endStr = startStr;
            if (currentTaskInfo.end_date) {
                const inclusiveEnd = new Date(currentTaskInfo.end_date.valueOf() - 86400000);
                endStr = gantt.date.date_to_str("%Y-%m-%d")(inclusiveEnd);
            }
            startDateInput.value = startStr;
            endDateInput.value   = endStr;

            // datepicker 상호 제약
            $('#startDate').datepicker('setEndDate', endStr);
            $('#endDate').datepicker('setStartDate', startStr);

            // 신규 / 수정 분기
            if (currentTaskInfo.$new) {
                document.getElementById('changeComment')?.removeAttribute("required");
                if (changeCommentDiv) changeCommentDiv.style.display = "none";
                modalTitle.innerText = "새 일감 등록";
                if (hiddenJobNo) hiddenJobNo.value = "";
                progressSelect.value = "0";
                progressSelect.setAttribute("disabled", "true");

            } else {
                modalTitle.innerText = "일감 수정";
                if (hiddenJobNo) hiddenJobNo.value = String(currentTaskInfo.id).replace("j", "");

                const changeComment = document.getElementById('changeComment');
                if (changeComment) {
                    changeComment.setAttribute("required", "true");
                    changeComment.value = "";
                }
                if (changeCommentDiv) changeCommentDiv.style.display = "block";

                // 제목
                document.getElementById('issueTitle').value = currentTaskInfo.text || "";

                // 상세 설명
                const descInput = document.querySelector('textarea[name="content"]');
                if (descInput) descInput.value = currentTaskInfo.description || "";

                // 공개범위
                const publicRadio = document.querySelector(`input[name="publicRole"][value="${currentTaskInfo.publicRole}"]`);
                if (publicRadio) publicRadio.checked = true;

                // Select Box 도우미: value 기준
                const setSelectByValue = (name, val) => {
                    const el = document.querySelector(`select[name="${name}"]`);
                    if (el && val != null) el.value = String(val);
                };
                // Select Box 도우미: text 기준
                const setSelectByText = (name, text) => {
                    const el = document.querySelector(`select[name="${name}"]`);
                    if (!el || !text) return;
                    for (let i = 0; i < el.options.length; i++) {
                        if (el.options[i].text === text) { el.selectedIndex = i; break; }
                    }
                };

                // task 객체에 두 가지 키 형태(camelCase / snake_case) 혼재하므로 양쪽 체크
                setSelectByValue("jobStatusNo", currentTaskInfo.job_status_no ?? currentTaskInfo.jobStatusNo);
                setSelectByValue("jobTypeNo",   currentTaskInfo.job_type_no   ?? currentTaskInfo.jobTypeNo);
                setSelectByText("managerId", currentTaskInfo.workerName);
                setSelectByText("userId",    currentTaskInfo.workerName);
                setSelectByText("priority",  currentTaskInfo.jobPriority);

                // 진척도
                const pct = currentTaskInfo.progress ? Math.round(currentTaskInfo.progress * 100) : 0;
                progressSelect.value = String(pct);
                
                // 파일 상세 정보
                if (currentFilesNo) {
                    fetch(`/project/user/${projectCode}/issue/gantt/files/read?filesNo=${currentFilesNo}`)
                    .then(res => {
                        if (!res.ok) throw new Error("네트워크 응답 오류");
                        return res.json();
                    })
                    .then(files => {
                        if (files.length === 0) {
                            noFileMsg.style.display = 'block';
                        } else {
                            files.forEach(f => {
                                const li = document.createElement('li');
                                li.className = 'list-group-item d-flex justify-content-between align-items-center bg-transparent border-0 px-0 py-1';
                                li.innerHTML = `
                                    <div class="d-flex align-items-center">
                                        <i class="bi bi-file-earmark me-2 text-primary"></i>
                                        <a href="/download/${f.detailsNo}" class="text-decoration-none text-dark small fw-bold">${f.filesName}</a>
                                    </div>
                                    <button type="button" class="btn btn-sm btn-outline-danger" onclick="markFileForDelete(${f.detailsNo}, this)">삭제</button>
                                `;
                                fileUl.appendChild(li);
                            });
                        }
                    })
                    .catch(err => {
                        console.error("첨부파일 목록 로드 실패:", err);
                        noFileMsg.style.display = 'block';
                    });
                } else {
                    // 파일 그룹 번호 자체가 없는 경우 (파일 미등록 상태)
                    noFileMsg.style.display = 'block';
                }
            }

            ganttIssueModal.show();
            currentTaskInfo = gantt.getTask(id); // show 이후 재참조
            console.log("현재 클릭한 일감 데이터: ", currentTaskInfo);
            return false; // 기본 lightbox 차단
        });

        gantt.init("gantt_here");
    }

    // ==========================================
    // 부트스트랩 모달 이벤트 및 Fetch 전송
    // ==========================================
    document.addEventListener("DOMContentLoaded", function() {
        // 모달 닫힐 때 신규 임시 task 정리
        document.getElementById('ganttCustomModal').addEventListener('hidden.bs.modal', function() {
            if (currentTaskInfo?.$new) {
                gantt.deleteTask(currentTaskInfo.id);
            }
            currentTaskInfo = null;
        });

        // 첨부파일 선택 시 화면에 목록(미리보기) 렌더링
        const fileInput = document.querySelector('input[name="files"]');
        const modalFileList = document.getElementById('modalFileList'); // 기존 파일이 그려지는 ul 태그 활용
        
        // 파일을 관리할 자바스크립트 전역 변수(배열)
        let selectedFiles = [];
        
        fileInput.addEventListener('change', function(e) {
            const noFileMsg = document.getElementById('noFileMessage');
            
            // 기존 선택된 파일 배열에 새로 선택한 파일들을 누적
            const newFiles = Array.from(e.target.files);
            selectedFiles = selectedFiles.concat(newFiles);

            // 파일이 하나라도 있으면 "파일이 없습니다" 메시지 숨김
            if(selectedFiles.length > 0 || modalFileList.children.length > 0) {
                noFileMsg.style.display = 'none';
            }

            renderNewFilesUI();
        });

        // 선택된 신규 파일 배열을 바탕으로 UI를 그리는 함수
        function renderNewFilesUI() {
            // 1. 이전에 그려진 '신규 파일' UI만 삭제 (기존 서버 파일은 건드리지 않음)
            const existingNewFileLi = document.querySelectorAll('.new-file-item');
            existingNewFileLi.forEach(li => li.remove());

            // 2. selectedFiles 배열을 순회하며 목록 추가
            selectedFiles.forEach((file, index) => {
                const li = document.createElement('li');
                // 'new-file-item' 클래스를 주어 나중에 지울 때 식별할 수 있게 함
                li.className = 'list-group-item d-flex justify-content-between align-items-center bg-transparent border-0 px-0 py-1 new-file-item';
                
                li.innerHTML = `
                    <div class="d-flex align-items-center">
                        <i class="bi bi-file-earmark-plus me-2"></i>
                        <span class="small fw-bold">${file.name}</span>
                    </div>
                    <button type="button" class="btn btn-sm btn-outline-secondary" onclick="removeNewFile(${index})">취소</button>
                `;
                modalFileList.appendChild(li);
            });
            
            // 3. 실제 <input type="file"> 객체 동기화 (DataTransfer 객체 사용)
            // 브라우저 보안 상 input.files는 직접 수정이 불가능하여 우회하는 정석적인 방법
            const dataTransfer = new DataTransfer();
            selectedFiles.forEach(f => dataTransfer.items.add(f));
            fileInput.files = dataTransfer.files;
        }

        // 신규 추가된 파일의 '취소' 버튼 클릭 시 호출
        window.removeNewFile = function(index) {
            // 배열에서 해당 파일 삭제
            selectedFiles.splice(index, 1);
            // UI 다시 그리기 (인덱스 동기화)
            renderNewFilesUI();
            
            // 모든 파일이 지워졌는지 체크
            const noFileMsg = document.getElementById('noFileMessage');
            if(selectedFiles.length === 0 && modalFileList.children.length === 0) {
                 noFileMsg.style.display = 'block';
            }
        };

        // 모달 닫힐 때 신규 파일 배열 초기화 로직 추가 (중복 방지)
        document.getElementById('ganttCustomModal').addEventListener('hidden.bs.modal', function() {
            if (currentTaskInfo?.$new) {
                gantt.deleteTask(currentTaskInfo.id);
            }
            currentTaskInfo = null;
            
            // 배열 초기화 및 input 값 초기화
            selectedFiles = [];
            fileInput.value = '';
        });
        
        // 등록/수정 버튼 클릭
        document.getElementById('btnIssueSubmit').addEventListener('click', function(e) {
            e.preventDefault();

            const form = document.getElementById('issueInsert');
            if (!form.checkValidity()) {
                form.reportValidity();
                gantt.message({text: "필수 입력값을 모두 입력해 주세요.", type: "error"});
                return;
            }

            const submitBtn = e.target;
            submitBtn.disabled = true;

            const isNew     = !!(currentTaskInfo?.$new);
            const reqMethod = 'POST';
            const targetUrl = isNew ? add_url : update_url;
            const formData  = new FormData(form);

            formData.append("projectCode", projectCode);
            if (isNew) {
                formData.append("progress", 0);
                formData.append("parent", currentTaskInfo.parent || "0");
                formData.append("duration", 1);
            } else {
                formData.append("jobNo", String(currentTaskInfo.id).replace("j", ""));
                
                const curFilesNo = currentTaskInfo.filesNo;
                if (curFilesNo && curFilesNo !== "null" && curFilesNo !== "undefined") {
                    formData.append("filesNo", curFilesNo);
                }
                
                formData.append("_method", "PUT"); // 스프링에게 이 POST 요청을 PUT으로 취급하라고 지시!
            }

            fetch(targetUrl, { 
            	method: reqMethod
            	, headers: {
                    [window.csrfHeader]: window.csrfToken
                }
            	, body: formData })
            .then(response => {
                submitBtn.disabled = false;
                if (!response.ok) throw new Error("서버 응답 오류: " + response.status);
                return response.json();
            })
            .then(savedTask => {
                ganttIssueModal.hide();

                // 날짜 파싱 (ISO → 로컬 Date)
                const startDateObj    = parseDate(savedTask.startDate);
                const inclusiveEndObj = parseDate(savedTask.endDate);
                const exclusiveEndObj = new Date(inclusiveEndObj.valueOf() + 86400000); // +1일 → exclusive

                const calcDuration = gantt.calculateDuration({
                    start_date: startDateObj,
                    end_date:   exclusiveEndObj
                });

                // UI 선택값 추출
                const managerSelect  = document.querySelector('select[name="managerId"]');
                const managerName    = managerSelect.options[managerSelect.selectedIndex].text;
                const prioritySelect = document.querySelector('select[name="priority"]');
                const priorityName   = prioritySelect.options[prioritySelect.selectedIndex].text;

                // ★ 공통 필드 객체 생성 (신규/수정 모두 사용)
                const fields = buildTaskFields(savedTask, startDateObj, exclusiveEndObj, calcDuration, managerName, priorityName);

                if (isNew) {
                    delete currentTaskInfo.$new;
                    gantt.deleteTask(currentTaskInfo.id); // 임시 Bar 제거

                    const newGanttTask = {
                        ...fields,
                        id:            "j" + savedTask.jobNo,
                        // addTask는 date_format에 맞는 포맷 문자열 또는 Date 객체 허용
                        // end_date는 fields에서 Date 객체로 오므로 그대로 사용 가능
                        // start_date도 Date 객체로 통일
                        parent:        currentTaskInfo.parent,
                        color:         "#3db9d3",
                        progressColor: "#2a8e9d",
                        open:          true
                    };

                    gantt.addTask(newGanttTask, newGanttTask.parent);

                    // 부모가 일감(j)인 경우 link 추가
                    if (newGanttTask.parent) {
					    gantt.addLink({
					        id:     "link_" + newGanttTask.id,
					        source: newGanttTask.parent,   // 부모 (p114 또는 j98)
					        target: newGanttTask.id,       // 나 (j102)
					        type:   "1"
					    });
					}
                    gantt.message({text: "일감이 성공적으로 등록되었습니다.", type: "success"});

                } else {
                    // Object.assign으로 기존 task에 한 번에 덮어쓰기
                    Object.assign(gantt.getTask(currentTaskInfo.id), fields);
                    gantt.updateTask(currentTaskInfo.id);
                    gantt.message({text: "일감이 성공적으로 수정되었습니다.", type: "info"});
                }
            })
            .catch(error => {
                submitBtn.disabled = false;
                console.error('Fetch 오류:', error);
                gantt.message({text: "처리 중 오류가 발생했습니다.", type: "error"});
                
                // refreshGanttData();오류발생 시 새로고침
            });
        });
    });

    // 오늘 날짜 마커
    let todayMarkerId = null;

    function renderTodayMarker() {
        if (!gantt.getMarker) return;
        const fmt = gantt.date.date_to_str(gantt.config.task_date);
        if (todayMarkerId) gantt.deleteMarker(todayMarkerId);
        todayMarkerId = gantt.addMarker({
            start_date: new Date(),
            css:        "today",
            text:       "오늘",
            title:      fmt(new Date())
        });
    }

    // 1분마다 마커 위치 갱신
    setInterval(function() {
        if (todayMarkerId && gantt.getMarker(todayMarkerId)) {
            const marker = gantt.getMarker(todayMarkerId);
            marker.start_date = new Date();
            marker.title = gantt.date.date_to_str(gantt.config.task_date)(marker.start_date);
            gantt.updateMarker(todayMarkerId);
        }
    }, 60000);

    // 공통 데이터 렌더링 함수 (SSR, Fetch 모두 사용)
    function applyGanttData(data) {
        if (!data) return;

        // --- Select Box 바인딩 ---
        const bindOptions = (selectName, list, valueKey, textKey) => {
            const el = document.querySelector(`select[name="${selectName}"]`);
            if (!el || !list) return;
            el.innerHTML = '<option value="" disabled selected hidden>선택</option>';
            list.forEach(item => el.add(new Option(item[textKey], item[valueKey])));
        };

        bindOptions('jobStatusNo', data.statusList,  'jobStatusNo', 'jobStatus');
        bindOptions('jobTypeNo',   data.typeList,     'jobTypeNo',   'jobType');
        bindOptions('priority',    data.priorityList, 'commonNo',    'commonName');

        const managerSelect = document.querySelector('select[name="managerId"]');
        const workerSelect  = document.querySelector('select[name="userId"]');
        
        // 콤보박스 중복 누적을 방지하기 위해 초기화
        managerSelect.innerHTML = '<option value="" disabled selected hidden>선택</option>';
        workerSelect.innerHTML = '<option value="" disabled selected hidden>선택</option>';

        (data.managerList || []).forEach(user => {
            const opt = new Option(user.username, user.userId);
            managerSelect.add(opt.cloneNode(true));
            workerSelect.add(opt);
        });

        // --- 휴일 등록 ---
        if (data.holidayList) {
            holidaySet = new Set(data.holidayList);

            // Gantt 엔진에 휴일 등록
            data.holidayList.forEach(dateStr => {
                const [y, m, d] = dateStr.split('-');
                gantt.setWorkTime({ date: new Date(y, m - 1, d), hours: false });
            });

            // Datepicker 초기화 (재호출 시 중복 바인딩 방지를 위해 destroy 및 이벤트 off 적용)
            $('.custom-datepicker').datepicker('destroy');
            $('.custom-datepicker').datepicker({
                format:         'yyyy-mm-dd',
                language:       'ko',
                autoclose:      true,
                todayHighlight: true,
                datesDisabled:  Array.from(holidaySet)
            });

            $('#startDate').off('changeDate').on('changeDate', function(e) {
                const newStart = e.format('yyyy-mm-dd');
                $('#endDate').datepicker('setStartDate', newStart);
                if ($('#endDate').val() < newStart) {
                    $('#endDate').datepicker('update', newStart);
                }
            });

            $('#endDate').off('changeDate').on('changeDate', function(e) {
                $('#startDate').datepicker('setEndDate', e.format('yyyy-mm-dd'));
            });
        }

        // --- Gantt 데이터 파싱 ---
        const ganttData = data.ganttData;
        let linkIdCounter = 1;

        ganttData.data.forEach(task => {
            if (task.parent === "0" || String(task.id).startsWith("p")) {
                task.open  = true;
                task.type  = "task";
                task.color = "#10c16f";
                task.progressColor = "#65c16f";
            } else {
                task.color = "#3db9d3";
                task.progressColor = "#2a8e9d";
            }

            const parentId = task.parent || "0";
            if (parentId !== "0") {
                ganttData.links.push({
                    id:     linkIdCounter++,
                    source: parentId,
                    target: task.id,
                    type:   "1"
                });
            }
        });

        gantt.clearAll();
        gantt.parse(ganttData);
        renderTodayMarker();
    }

    // 최초 로딩 (SSR로 받은 데이터를 통신 없이 즉시 그림)
    function loadInitData() {
        // Controller에서 Model에 담아준 데이터를 Thymeleaf 문법으로 즉시 파싱
        const initData = /*[[${initData}]]*/ null;
        
        if (initData) {
            applyGanttData(initData);
        } else {
            console.error("초기 렌더링용 데이터(initData)가 전달되지 않았습니다.");
        }
    }

    // 필요 시 백엔드 데이터를 다시 가져오는 갱신 함수
    function refreshGanttData() {
        fetch(init_url)
        .then(res => {
            if (!res.ok) throw new Error("데이터 로드 실패: " + res.status);
            return res.json();
        })
        .then(data => {
            applyGanttData(data);
            gantt.message({text: "데이터가 최신화되었습니다.", type: "success"});
        })
        .catch(err => {
            console.error("데이터 갱신 오류:", err);
            gantt.message({text: "데이터 갱신 중 오류가 발생했습니다.", type: "error"});
        });
    }
    // 화면에서 파일을 숨기고, 삭제할 파일 번호를 form에 추가하는 함수
    function markFileForDelete(detailsNo, btnElement) {
        const container = document.getElementById('deleteFilesContainer');
        const input = document.createElement('input');
        input.type = 'hidden';
        input.name = 'deleteFiles'; // IssueController의 수정 로직과 완벽히 매핑됨
        input.value = detailsNo;
        container.appendChild(input);

        // UI에서 해당 파일 줄(li) 삭제
        btnElement.closest('li').remove();
    }

    // 실행
    initGanttUI();
    loadInitData();
</script>
