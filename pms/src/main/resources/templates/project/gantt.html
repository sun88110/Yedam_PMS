<!DOCTYPE html>
<html lang="ko" xmlns:th="https://www.thymeleaf.org/"
	xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
	layout:decorate="~{common/layouts/full-default-layout}"
	layout:fragment="Content">
<head>
<meta charset="UTF-8">
<title>PMS Project</title>
<style>
.gantt-wrapper {
	/* 100vh = 100% of the viewport height. 120px is an estimate for header/padding. Adjust if needed. */
	height: calc(100vh - 120px);
	width: 100%;
}
/* The gantt container itself should fill its wrapper */
#gantt_here {
	height: 100%;
	width: 100%;
}

/* 입력 버튼 헤더 css 수정 */
.gantt_grid_head_add::before {
	display: none !important;
	content: "" !important;
}

.gantt_grid_head_add {
	cursor: default !important; /* 손가락 모양(pointer)을 기본 화살표로 변경 */
	opacity: 1 !important; /* 흐릿한 효과 제거 */
}
/* 그리드 헤더 셀 디자인 수정 */
.gantt_grid_head_cell {
	line-height: center; /* 헤더 높이에 맞춘 세로 중앙 정렬 */
}

.gantt_grid_head_cell, .gantt_cell, .gantt_scale_cell, .gantt_task_cell {
    border-right: 1px solid #d9d9d9 !important; 
}

.gantt_grid_head_cell, .gantt_scale_cell {
    font-size: 1rem !important;
}
</style>
<link th:href="@{/dhtmlx/gantt/dhtmlxgantt.css}" rel="stylesheet">
<script th:src="@{/dhtmlx/gantt/dhtmlxgantt.js}"></script> 
<!-- <script src="https://cdn.dhtmlx.com/gantt/edge/dhtmlxgantt.js"></script> -->
<!-- <script src="https://cdn.dhtmlx.com/gantt/edge/locales/locale_kr.js"></script> -->
</head>
<body>
	<div class="gantt-wrapper">
		<div id="gantt_here"></div>
	</div>
	
	
	<div class="modal fade" id="ganttCustomModal" tabindex="-1" aria-labelledby="ganttModalLabel" aria-hidden="true" style="z-index: 1055;">
        <div class="modal-dialog modal-lg">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title" id="ganttModalLabel">새 일감 등록</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <div class="modal-body">
                    <th:block th:replace="~{common/fragments/project/issue-form-fragment :: IssueForm}"></th:block>
                </div>
            </div>
        </div>
    </div>

    <th:block th:replace="~{common/fragments/issue/user-select-modal :: UserSelectModal}"></th:block>
    <th:block th:replace="~{common/fragments/issue/issue-select-modal :: IssueSelectModal}"></th:block>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap-datepicker/1.10.0/css/bootstrap-datepicker.min.css" />
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/bootstrap-datepicker/1.10.0/js/bootstrap-datepicker.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/bootstrap-datepicker/1.10.0/locales/bootstrap-datepicker.ko.min.js"></script>
	
	<script th:inline="javascript">
	// 입력폼 관리하는 전역데이터
    let ganttIssueModal;
    let currentTaskInfo = null;
    let holidaySet = new Set(); // 휴일 목록을 담아둘 Set 자료구조 추가
    
    const projectCode = /*[[${projectCode}]]*/ null;
    const url = /*[[@{/project/user/{code}/gantt/data(code=${projectCode})}]]*/ '/';
    const add_url = /*[[@{/project/user/{code}/gantt/insert(code=${projectCode})}]]*/ '/';
    const update_url = /*[[@{/project/user/{code}/gantt/update(code=${projectCode})}]]*/ '/';
    const setting_url = /*[[@{/project/user/{code}/gantt/setting(code=${projectCode})}]]*/ '/';
    
    gantt.plugins({ 
    	    marker: true,
            worktime: true 
        });

    // ==========================================
    // 1. 차트 외형(UI) 및 이벤트 설정 함수
    // ==========================================
    function initGanttUI() {
        gantt.i18n.setLocale("kr");
        gantt.setSkin("meadow");
        gantt.config.date_format = "%d-%m-%Y";

        // 헤더 높이 60px 조절
        gantt.config.grid_header_height = 60; 
        gantt.config.scale_height = 60;       

        // 리사이즈 기능 용도, 적용안됨. TODO: 안되는원인 파악해서 적용되게 수정해야함
        gantt.config.grid_resize = true;       // 왼쪽 테이블과 오른쪽 차트 사이의 경계선 드래그 허용
        gantt.config.keep_grid_width = false;  // 내부 컬럼 크기 조절 시 테이블 전체 넓이도 같이 변하도록 허용
        
        // 진척도 드래그불가능
        gantt.config.drag_progress = false;
        
        // 업무일 기준으로만 일감의 기간(Duration)이 늘어나도록 보정
        gantt.config.work_time = true; 
        gantt.config.correct_work_time = true;
        gantt.config.skip_off_time = true;
        
        gantt.config.columns = [
            { name: "text",       label: "작업명",  tree: true, width: "*", min_width: 150, resize: true },
            /* { name: "duration",   label: "기간(일)", align: "center" }, */
            { name: "start_date", label: "시작일", width: "*", min_width: 90, align: "center", resize: true },
            { name: "displayEnd", label: "종료일", width: "*", min_width: 90, align: "center", resize: true
            	, template: function(task) {
                        if(!task.displayEnd) return "";
                        var parts = task.displayEnd.split("-");
                        return parts[2] + "-" + parts[1] + "-" + parts[0]; 
                    }
            	},
            { name: "workerName", label: "담당자",   align: "center", width: 80, resize: true },
            { name: "jobPriority",label: "우선순위", align: "center", width: 70, resize: true },
            { name: "add",        label: "추가",     width: 44 }
        ];

        gantt.config.scales = [
            { unit: "month", step: 1, format: "%Y년 %n월" },
            { unit: "day",   step: 1, format: "%d일(%D)" } 
        ];
        
        gantt.ignore_time = function(date) {
            const yyyy = date.getFullYear();
            const mm = String(date.getMonth() + 1).padStart(2, '0');
            const dd = String(date.getDate()).padStart(2, '0');
            const dateStr = `${yyyy}-${mm}-${dd}`; 
            
            // 전역 Set에 해당 날짜가 존재하면 true 반환 -> 화면에서 아예 안 그림!
            if (holidaySet.has(dateStr)) {
                return true; 
            }
            return false; 
        };

        // --- 이벤트 설정들 ---
        // 헤더 '추가' 클릭 시 더미 데이터 생성 방지
        gantt.attachEvent("onGridHeaderClick", function(name, e) {
            if (name === "add") return false; 
            return true; 
        });

       // 1. 더블클릭 이벤트: 프로젝트(p)인 경우에만 기본 동작(모달 열기) 차단
        gantt.attachEvent("onTaskDblClick", function(id, e){
            if (String(id).startsWith("p")) {
                return false; 
            }
            return true; // 그 외(일감)는 정상적으로 onBeforeLightbox 로 흐름을 넘김
        });
        // 2. 기본 모달 대신 커스텀 부트스트랩 모달 띄우기
        gantt.attachEvent("onBeforeLightbox", function(id) {
            currentTaskInfo = gantt.getTask(id);

            if (!ganttIssueModal) {
                ganttIssueModal = new bootstrap.Modal(document.getElementById('ganttCustomModal'));
            }
            
            document.getElementById('issueInsert').reset(); 

            const hiddenJobNo = document.getElementById('hiddenJobNo');
            const changeCommentDiv = document.getElementById('changeCommentDiv'); // 코멘트 영역
            const modalTitle = document.getElementById('ganttModalLabel');
            const progressSelect = document.getElementById('progressSelect');
            const hiddenProjectNo = document.getElementById('hiddenProjectNo');
            const hiddenParentJobNo = document.getElementById('hiddenParentJobNo');
            const startDateInput = document.getElementById('startDate');
            const endDateInput = document.getElementById('endDate');

            // [숨김 필드 자동 세팅]
            let rawParentId = String(currentTaskInfo.parent);
            if (rawParentId.startsWith("p")) {
                hiddenProjectNo.value = rawParentId.replace("p", "");
                hiddenParentJobNo.value = ""; 
            } else if (rawParentId.startsWith("j")) {
                hiddenParentJobNo.value = rawParentId.replace("j", "");
                let parentTaskNode = gantt.getTask(rawParentId);
                let pId = parentTaskNode.project_id || ""; 
                hiddenProjectNo.value = pId.replace("p", ""); 
            } else {
                hiddenProjectNo.value = projectCode;
            }

            // [날짜 기본 세팅]
            let startStr = "";
            if (currentTaskInfo.start_date) {
                startStr = gantt.date.date_to_str("%Y-%m-%d")(currentTaskInfo.start_date);
            }
            let endStr = startStr;
            if (currentTaskInfo.displayEnd) {
                const parts = currentTaskInfo.displayEnd.split("-");
                if(parts.length === 3) endStr = `${parts[2]}-${parts[1]}-${parts[0]}`;
            }
            startDateInput.value = startStr;
            endDateInput.value = endStr;

            // [신규/수정 상태 분기]
            if (currentTaskInfo.$new) {
                // 신규 등록
                if (document.getElementById('changeComment')) {
                    document.getElementById('changeComment').removeAttribute("required"); 
                }
                if (changeCommentDiv) changeCommentDiv.style.display = "none"; 
                
                modalTitle.innerText = "새 일감 등록";
                if (hiddenJobNo) hiddenJobNo.value = ""; 
                progressSelect.value = "0";
                progressSelect.setAttribute("disabled", "true");
            } else {
                // 기존 일감 수정
                modalTitle.innerText = "일감 수정";
                if (hiddenJobNo) hiddenJobNo.value = String(currentTaskInfo.id).replace("j", ""); 
                
                // 변경 이력 필수 처리
                if (document.getElementById('changeComment')) {
                    document.getElementById('changeComment').setAttribute("required", "true");
                    document.getElementById('changeComment').value = ""; 
                }
                if (changeCommentDiv) changeCommentDiv.style.display = "block"; 
                
                // 제목 바인딩
                document.getElementById('issueTitle').value = currentTaskInfo.text || "";
                
                // 기본 텍스트 바인딩
                document.getElementById('issueTitle').value = currentTaskInfo.text || "";
                
                // 상세 설명
                const descInput = document.querySelector('textarea[name="content"]'); 
                if (descInput) descInput.value = currentTaskInfo.description || ""; 
                
                // 공개범위
                let roleVal = currentTaskInfo.publicRole;
                    
                const publicRadio = document.querySelector(`input[name="publicRole"][value="${roleVal}"]`);
                if (publicRadio) {
                    publicRadio.checked = true;
                }
                
             // Select Box 세팅 도우미 (Value 기준 - 숫자/문자 타입 강제 일치)
                const setSelectByValue = (selectName, val) => {
                    const select = document.querySelector(`select[name="${selectName}"]`);
                    if (select && val != null) select.value = String(val); // 강제 문자열 변환으로 매칭 오류 방지
                };

                // Select Box 세팅 도우미 (Text 기준 - 이름으로 매칭)
                const setSelectByText = (selectName, textValue) => {
                    const select = document.querySelector(`select[name="${selectName}"]`);
                    if (!select || !textValue) return;
                    for (let i = 0; i < select.options.length; i++) {
                        if (select.options[i].text === textValue) {
                            select.selectedIndex = i;
                            break;
                        }
                    }
                };

                // 일감 상태 & 유형 (Value 매핑)
                // Spring Boot의 JSON 변환 규칙(camelCase)을 고려해 둘 다 체크
                setSelectByValue("jobStatusNo", currentTaskInfo.job_status_no || currentTaskInfo.jobStatusNo);
                setSelectByValue("jobTypeNo", currentTaskInfo.job_type_no || currentTaskInfo.jobTypeNo);
                
                // 담당자 & 작업자 (Text 매핑)
                // SQL에서 ID를 반환하지 않으므로, 화면에 보이는 이름("배진욱" 등)으로 콤보박스 선택
                const workerName = currentTaskInfo.workerName || currentTaskInfo.worker_name;
                setSelectByText("managerId", workerName);
                setSelectByText("userId", workerName);
                
                // 우선순위 매핑
                setSelectByText("priority", currentTaskInfo.jobPriority || currentTaskInfo.job_priority); 
                
                // 진척도 바인딩
                const progressPercent = currentTaskInfo.progress ? Math.round(currentTaskInfo.progress * 100) : 0;
                document.getElementById('progressSelect').value = progressPercent.toString();
            }

            ganttIssueModal.show();
            
            // 로그
			currentTaskInfo = gantt.getTask(id);
            console.log("현재 클릭한 일감 데이터: ", currentTaskInfo);
            
            // dhtmlx 기본 모달이 뜨는 것을 막기 위해 반드시 false 반환
            return false; 
        });

        // UI 껍데기 렌더링
        gantt.init("gantt_here");
    }
    
     // ==========================================
    // 부트스트랩 모달 이벤트 및 Fetch 전송 (initGanttUI 밖으로 빼냄)
    // ==========================================
    document.addEventListener("DOMContentLoaded", function() {
        // 1. 모달이 닫힐 때 작동하는 안전 클린업 로직 (취소, X버튼 등)
        document.getElementById('ganttCustomModal').addEventListener('hidden.bs.modal', function () {
            if (currentTaskInfo && currentTaskInfo.$new) {
                gantt.deleteTask(currentTaskInfo.id); // 신규 작성 중 취소 시 임시 바(Bar) 삭제
            }
            currentTaskInfo = null;
        });

        // 2. [등록] 버튼 클릭 시 Fetch 전송
        document.getElementById('btnIssueSubmit').addEventListener('click', function(e) {
        	e.preventDefault();
        	
            const form = document.getElementById('issueInsert');
            const formData = new FormData(form);

            // 더블클릭 방지
        	const submitBtn = e.target;
            submitBtn.disabled = true;
            
            // 신규 등록인지, 기존 일감 수정인지 판별
            const isNew = currentTaskInfo && currentTaskInfo.$new;
            const reqMethod = isNew ? 'POST' : 'PUT'; // HTTP Method 및 대상 URL 설정
            const targetUrl = isNew ? add_url : update_url;
            
            
            if (currentTaskInfo && currentTaskInfo.$new) {
                formData.append("progress", 0);
            }
            // 프로젝트 코드 필수 주입
            formData.append("projectCode", projectCode);
            
            // 간트 차트 렌더링을 위한 필수 데이터
            if (isNew) {
                formData.append("progress", 0);
                formData.append("parent", currentTaskInfo.parent || "0");
                formData.append("duration", 1); 
            } else {
                const pureJobNo = String(currentTaskInfo.id).replace("j", "");
                formData.append("jobNo", pureJobNo);
            }
            
            fetch(targetUrl, {
                method: reqMethod ,
                body: formData 
            })
            .then(response => {
            	submitBtn.disabled = false;
                if(!response.ok) throw new Error("서버 응답 오류");
                return response.json(); 
            })
            .then(savedTask => {
            	ganttIssueModal.hide();
            	
            	// 1. 단순 변환 시도 후 에러(NaN)가 나면 문자열 분리해서 확실하게 Date 객체로 파싱
                let startDateObj = new Date(savedTask.startDate);
                if (isNaN(startDateObj.getTime()) && typeof savedTask.startDate === 'string') {
                    const parts = savedTask.startDate.split("-"); // YYYY-MM-DD 기준
                    startDateObj = new Date(parts[0], parts[1] - 1, parts[2]);
                }
                
                let endDateObj = new Date(savedTask.endDate);
                if (isNaN(endDateObj.getTime()) && typeof savedTask.endDate === 'string') {
                    const parts = savedTask.endDate.split("-");
                    endDateObj = new Date(parts[0], parts[1] - 1, parts[2]);
                }
                
                const calcDuration = gantt.calculateDuration({
                    start_date: startDateObj, 
                    end_date: endDateObj
                });
                
                const formatFunc = gantt.date.date_to_str("%d-%m-%Y");

                const managerSelect = document.querySelector('select[name="managerId"]');
                const managerName = managerSelect.options[managerSelect.selectedIndex].text;

                const prioritySelect = document.querySelector('select[name="priority"]');
                const priorityName = prioritySelect.options[prioritySelect.selectedIndex].text;

                if (isNew) {
                    // [1. 신규 등록 시 UI 처리]
                    delete currentTaskInfo.$new; 
                    gantt.deleteTask(currentTaskInfo.id); // 임시 바 지우기

                    let newGanttTask = {
                        id: "j" + savedTask.jobNo,        
                        text: savedTask.title,            
                        start_date: formatFunc(startDateObj), 
                        duration: calcDuration,               
                        parent: currentTaskInfo.parent,   
                        workerName: managerName,              
                        jobPriority: priorityName,
                        color: "#3db9d3",
                        progressColor: "#2a8e9d",
                        open: true
                    };

                    gantt.addTask(newGanttTask, newGanttTask.parent);

                    if (newGanttTask.parent && String(newGanttTask.parent).startsWith("j")) {
                        gantt.addLink({
                            id: "link_" + newGanttTask.id, 
                            source: newGanttTask.parent,   
                            target: newGanttTask.id,       
                            type: "1"                      
                        });
                    }
                    gantt.message({text: "일감이 성공적으로 등록되었습니다.", type: "success"});

                } else {
                	// [2. 기존 일감 수정 시 UI 처리]
                    let taskToUpdate = gantt.getTask(currentTaskInfo.id);
                    // 서버에서 받아온(또는 폼에 있는) 새 데이터로 덮어쓰기
                    taskToUpdate.text = savedTask.title;
                    // ★ 핵심 수정: formatFunc()를 지우고 순수 Date 객체(startDateObj)를 그대로 대입!
                    taskToUpdate.start_date = startDateObj; 
                    taskToUpdate.end_date = endDateObj; // 내부 계산 꼬임 방지를 위해 endDate도 명시적 세팅
                    taskToUpdate.duration = calcDuration;
                    
                    taskToUpdate.workerName = managerName;
                    taskToUpdate.jobPriority = priorityName;
                    
                    // 진척도(Progress)도 업데이트 (폼에서 받아온 값이 %이므로 100으로 나눔)
                    const progressVal = document.getElementById('progressSelect').value;
                    taskToUpdate.progress = parseFloat(progressVal) / 100;

                    // 간트 차트의 해당 행(Row)만 다시 그리기!
                    gantt.updateTask(currentTaskInfo.id); 
                    
                    gantt.message({text: "일감이 성공적으로 수정되었습니다.", type: "info"});
                }
            })
            .catch(error => {
            	submitBtn.disabled = false;
                console.error('Error:', error);
                gantt.message({text: "등록 중 오류가 발생했습니다.", type: "error"});
            });
        });
    });
    
    // 전역 변수로 마커 ID 관리
    let todayMarkerId = null;

    // 마커 생성 전용 함수
    function renderTodayMarker() {
        if (!gantt.getMarker) return; // 플러그인 로드 확인
        
        var dateToStr = gantt.date.date_to_str(gantt.config.task_date);
        
        // 기존 마커가 있다면 지우고 다시 생성
        if (todayMarkerId) gantt.deleteMarker(todayMarkerId);
        
        todayMarkerId = gantt.addMarker({
            start_date: new Date(),
            css: "today",
            text: "오늘",
            title: dateToStr(new Date())
        });
    }

    // 1분마다 마커 위치 업데이트 (전역에 한 번만 선언)
    setInterval(function() {
        if (todayMarkerId && gantt.getMarker(todayMarkerId)) {
            var todayMarker = gantt.getMarker(todayMarkerId);
            todayMarker.start_date = new Date();
            var dateToStr = gantt.date.date_to_str(gantt.config.task_date);
            todayMarker.title = dateToStr(todayMarker.start_date);
            gantt.updateMarker(todayMarkerId);
        }
    }, 1000 * 60);
    // ==========================================
    // 2. 서버에서 데이터를 가져와서 차트에 채우는 함수
    // ==========================================
    function loadGanttData() {
        fetch(url)
        .then(response => {
            if(!response.ok) throw new Error("상태코드 "+response.status);
            return response.json(); 
        })
        .then(ganttData => {
            let linkIdCounter = 1;
            let previousTaskByParent = {}; 
            
            ganttData.data.forEach( task => {
                if (task.parent === "0" || String(task.id).startsWith("p")) {
                    task.open = true;        
                    task.type = "project";   
                    task.color = "#10c16f";          
                    task.progressColor = "#65c16f"; 
                } else {
                    task.color = "#3db9d3";          
                    task.progressColor = "#2a8e9d"; 
                }

                let parentId = task.parent || "0";
                if (parentId !== "0") {
                    ganttData.links.push({
                        id: linkIdCounter++,
                        source: parentId, 
                        target: task.id,  
                        type: "1"         
                    });
                }
                previousTaskByParent[parentId] = task; 
            });

            // ★ 중요: 이전 화면에 있던 데이터를 지우고 새 데이터로 파싱 ★
            gantt.clearAll();
            gantt.parse(ganttData);

            // 마커 다시그리기
            renderTodayMarker();
        })
        .catch(err => {
            console.error(err);
            gantt.message({ text: "데이터 호출 중 문제가 발생했습니다.", type: "error" });
        });
    }
    
    // ==========================================
    // 폼 Select Box 기초 데이터 로딩
    // ==========================================
    function loadSettingData() {
    	return fetch(setting_url)
        .then(res => res.json())
        .then(data => {
            // 셀렉트 박스 옵션 채우는 도우미 함수
            const bindOptions = (selectName, list, valueKey, textKey) => {
                const selectEl = document.querySelector(`select[name="${selectName}"]`);
                if(!selectEl || !list) return;
                selectEl.innerHTML = '<option value="" disabled selected hidden>선택</option>';
                list.forEach(item => selectEl.add(new Option(item[textKey], item[valueKey])));
            };

            // 상태, 유형, 우선순위 바인딩
            // TO-BE (해결: HTML과 동일하게 jobStatusNo, jobTypeNo 적용)
            bindOptions('jobStatusNo', data.statusList, 'jobStatusNo', 'jobStatus');
			bindOptions('jobTypeNo', data.typeList, 'jobTypeNo', 'jobType');
            bindOptions('priority', data.priorityList, 'commonNo', 'commonName');
            
            // 담당자 & 작업자 바인딩 (동일한 리스트 사용)
            const managerSelect = document.querySelector('select[name="managerId"]');
            const workerSelect = document.querySelector('select[name="userId"]');
            if(data.managerList) {
                data.managerList.forEach(user => {
                    let option = new Option(user.username, user.userId);
                    managerSelect.add(option.cloneNode(true));
                    workerSelect.add(option);
                });
            }
            
            //휴일 목록을 전역 Set에 세팅하고 차트 새로고침
            if (data.holidayList) {
                holidaySet = new Set(data.holidayList);
                
             // 1. 간트 차트 엔진에 휴일 등록
                data.holidayList.forEach(dateStr => {
                    const parts = dateStr.split('-');
                    gantt.setWorkTime({
                        date: new Date(parts[0], parts[1] - 1, parts[2]),
                        hours: false 
                    });
                });

                // 2. ★ 추가: 부트스트랩 Datepicker에 휴일 배열을 넣어 비활성화!
                $('.custom-datepicker').datepicker({
                    format: 'yyyy-mm-dd',
                    language: 'ko',
                    autoclose: true,
                    todayHighlight: true,
                    datesDisabled: Array.from(holidaySet) // 이 배열에 있는 날짜는 클릭 불가(회색 처리)
                });

            }
        })
        .catch(err => console.error("세팅 로드 에러:", err));
    }
    // ==========================================
    // 3. 페이지가 로드되면 실행되는 메인 로직
    // ==========================================
    initGanttUI();   // 1. 차트 껍데기를 먼저 그리고
    loadSettingData().then(() => {
        loadGanttData(); 
    });
</script>

</body>
</html>
