<!DOCTYPE html>
<html lang="ko" xmlns:th="https://www.thymeleaf.org/">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>로그인</title>

<link href="https://cdn.jsdelivr.net/npm/@coreui/coreui@5.0.0/dist/css/coreui.min.css" rel="stylesheet">
<script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
</head>

<body class="bg-body-tertiary">

	<div class="container min-vh-100 d-flex align-items-center justify-content-center">
		<div class="row justify-content-center w-100">
			<div class="col-md-6 col-lg-5">
				<div class="card shadow-lg border-0 rounded-4">
					<div class="card-body p-4">
						<div class="text-center mb-4">
							<h3 class="fw-bold">로그인</h3>
							<p class="text-medium-emphasis small">계정 정보를 입력해주세요</p>
						</div>

						<div class="mb-4">
							<div th:if="${param.error}" class="alert alert-danger border-0 shadow-sm alert-dismissible fade show" role="alert">
								<span th:text="${session['SPRING_SECURITY_LAST_EXCEPTION'] != null ? session['SPRING_SECURITY_LAST_EXCEPTION'].message : '아이디 또는 비밀번호가 올바르지 않습니다.'}" class="small"> 에러 메시지 내용 </span>
							</div>
							<div th:if="${msg}" class="alert alert-success border-0 shadow-sm alert-dismissible fade show" role="alert">
								<span th:text="${msg}" class="small"></span>
							</div>
						</div>

						<form id="loginForm" th:action="@{/user/login}" th:object="${loginDto}" method="post">
							<div class="mb-4">
								<label class="form-label fw-bold small">유저 ID</label>
								<input type="text" id="userId" class="form-control" th:field="*{userId}" placeholder="아이디 입력">
								<div id="userIdError" class="text-danger small mt-1" style="display: none;">아이디를 입력해주세요.</div>
							</div>

							<div class="mb-3">
								<label class="form-label fw-bold small">비밀번호</label>
								<input type="password" id="password" class="form-control" th:field="*{password}" placeholder="비밀번호 입력">
								<div id="passwordError" class="text-danger small mt-1" style="display: none;">비밀번호를 입력해주세요.</div>
							</div>

							<div class="mb-3 form-check">
								<input type="checkbox" name="remember-me" id="rememberMe" class="form-check-input">
								<label class="form-check-label small text-secondary" for="rememberMe"> 로그인 상태 유지 </label>
							</div>

							<div class="d-grid mt-4">
								<button type="submit" class="btn btn-primary rounded-3 fw-bold">로그인</button>
							</div>

							<div class="d-flex justify-content-between mt-4 small">
								<a th:href="@{/user/new}" class="text-decoration-none fw-bold text-primary"> 회원가입 </a> <a th:href="@{/user/pwResetPage}" class="text-decoration-none text-secondary"> 비밀번호 찾기/변경 </a>
							</div>
						</form>
					</div>
				</div>
			</div>
		</div>
	</div>

	<div class="toast-container position-fixed bottom-0 end-0 p-3" style="z-index: 9999;">
		<div id="pmsToast" class="toast hide" role="alert" aria-live="assertive" aria-atomic="true">
			<div class="toast-header text-white" id="toastHeader">
				<strong class="me-auto" id="toastTitle">알림</strong>
				<button type="button" class="btn-close btn-close-white" data-coreui-dismiss="toast"></button>
			</div>
			<div class="toast-body" id="toastBody"></div>
		</div>
	</div>

	<script src="https://cdn.jsdelivr.net/npm/@coreui/coreui@5.0.0/dist/js/coreui.bundle.min.js"></script>

	<script th:inline="javascript">
        // 토스트 표시 함수
        function showToast(message, type = 'success') {
            const pmsToastElement = document.getElementById('pmsToast');
            if (!pmsToastElement) return;

            const header = $('#toastHeader');
            const title = $('#toastTitle');
            const body = $('#toastBody');

            header.removeClass('bg-success bg-danger').addClass(type === 'success' ? 'bg-success' : 'bg-danger');
            title.text(type === 'success' ? '성공' : '알림');
            body.text(message);

            const toast = new coreui.Toast(pmsToastElement);
            toast.show();
        }

        document.addEventListener('DOMContentLoaded', function() {
            // 📍 세션 스토리지 체크 (마이페이지 이메일 수정 후 강제 로그아웃 시 알림용)
            const pendingToast = sessionStorage.getItem('pendingToast');
            if (pendingToast) {
                const data = JSON.parse(pendingToast);
                setTimeout(() => {
                    showToast(data.message, data.type);
                    sessionStorage.removeItem('pendingToast');
                }, 300);
            }

            // 로그인 유효성 검사
            document.getElementById('loginForm').addEventListener('submit', function(event) {
                let isValid = true;
                const userId = document.getElementById('userId');
                const password = document.getElementById('password');
                
                document.getElementById('userIdError').style.display = 'none';
                document.getElementById('passwordError').style.display = 'none';

                if (!userId.value.trim()) {
                    document.getElementById('userIdError').style.display = 'block';
                    userId.focus();
                    isValid = false;
                } else if (!password.value.trim()) {
                    document.getElementById('passwordError').style.display = 'block';
                    password.focus();
                    isValid = false;
                }

                if (!isValid) event.preventDefault();
            });
        });
    </script>
</body>
</html>
