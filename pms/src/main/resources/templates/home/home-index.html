<!doctype html>
<html lang="ko" xmlns:th="https://www.thymeleaf.org/"
	xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
	layout:decorate="~{common/layouts/default-layout}"
	layout:fragment="Content">

<head>
<meta charset="UTF-8" />
<title>Dashboard</title>
<script
	src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.0/Sortable.min.js"></script>

<style>
/* CoreUI 테마 변수 활용을 위한 기본 설정 */
:root {
	--box-bg: #ffffff;
	--box-text: #333333;
	--box-shadow: rgba(0, 0, 0, 0.05);
	--item-hover: #f8f9fa;
	--border-color: #eeeeee;
}

/* 다크모드일 때 색상 반전 정의 */
[data-coreui-theme="dark"] {
	--box-bg: #212631; /* CoreUI 다크 카드 배경색 */
	--box-text: #f0f2f5; /* 밝은 텍스트 */
	--box-shadow: rgba(0, 0, 0, 0.3);
	--item-hover: #2d323c; /* 다크모드용 호버 색상 */
	--border-color: #323a49; /* 어두운 테두리 */
}

/* 1. 대시보드 그리드 레이아웃 */
.dashboard-grid {
	display: grid;
	grid-template-columns: repeat(2, 1fr);
	gap: 24px;
	align-items: start;
}

/* 2. 위젯 박스 공통 스타일 - 변수 적용 */
.section-box {
	background: var(--box-bg);
	color: var(--box-text);
	border-radius: 12px;
	padding: 24px;
	box-shadow: 0 4px 12px var(--box-shadow);
	height: 520px;
	display: flex;
	flex-direction: column;
	transition: transform 0.2s ease, box-shadow 0.2s ease, background 0.3s
		ease;
}

.section-box:hover {
	transform: translateY(-3px);
	box-shadow: 0 8px 20px rgba(0, 0, 0, 0.15);
}

/* 3. 타이틀 디자인 */
.section-title {
	font-size: 18px;
	font-weight: 700;
	margin-bottom: 20px;
	display: flex;
	align-items: center;
	justify-content: space-between;
	gap: 8px;
	cursor: grab;
	flex: 0 0 auto;
}

/* 콘텐츠 영역: 내부 스크롤 활성화 */
.section-content {
	flex: 1 1 auto;
	overflow-y: auto !important;
	overflow-x: hidden;
	padding-right: 5px;
}

/* 스크롤바 커스텀 */
.section-content::-webkit-scrollbar {
	width: 5px;
}

.section-content::-webkit-scrollbar-thumb {
	background-color: #ccc;
	border-radius: 10px;
}

/* 5. 페이지네이션 스타일 (숨김 유지) */
.widget-pagination {
	display: none !important;
}

/* 6. 메모 카드 스타일 - 다크모드 최적화 */
.memo-bg-1 {
	background-color: #fff9db !important;
}

.memo-bg-2 {
	background-color: #e3faf2 !important;
}

.memo-bg-3 {
	background-color: #f3f0ff !important;
}

.memo-bg-4 {
	background-color: #fff0f6 !important;
}

/* 다크모드에서 메모 가독성을 위해 배경 채도 조절 */
[data-coreui-theme="dark"] .memo-bg-1 {
	background-color: #4a452a !important;
	color: #fff9db !important;
}

[data-coreui-theme="dark"] .memo-bg-2 {
	background-color: #2b453e !important;
	color: #e3faf2 !important;
}

[data-coreui-theme="dark"] .memo-bg-3 {
	background-color: #38324a !important;
	color: #f3f0ff !important;
}

[data-coreui-theme="dark"] .memo-bg-4 {
	background-color: #4a323a !important;
	color: #fff0f6 !important;
}

.memo-card {
	position: relative;
	cursor: pointer;
	transition: all 0.2s;
	border: none !important;
	min-height: 140px;
}

.memo-card:hover {
	transform: scale(1.03);
	box-shadow: 0 6px 15px rgba(0, 0, 0, 0.2) !important;
}

.memo-content-preview {
	display: -webkit-box;
	-webkit-line-clamp: 5;
	-webkit-box-orient: vertical;
	overflow: hidden;
	font-size: 0.85rem;
	line-height: 1.5;
	color: inherit; /* 부모 색상 상속 */
}

/* 공지사항 행 스타일 - 변수 적용 */
.notice-row {
	cursor: pointer;
	transition: background 0.2s;
	border-bottom: 1px solid var(--border-color);
	color: var(--box-text);
}

.notice-row:hover {
	background-color: var(--item-hover) !important;
}

.date-badge {
	font-size: 0.75rem;
	color: #888;
	border: 1px solid var(--border-color);
	padding: 2px 6px;
	border-radius: 4px;
}

/* 프로젝트 카드 배경 대응 */
.card.bg-light {
	background-color: var(--item-hover) !important;
	color: var(--box-text) !important;
}

.hidden-item {
	display: none !important;
}

.drag-ghost {
	opacity: 0.3;
}

/* 6. 메모 삭제 버튼 스타일 (이전 스타일로 복구) */
.btn-delete-memo {
	position: absolute;
	top: 8px;
	right: 8px;
	width: 24px;
	height: 24px;
	border-radius: 50%;
	background-color: rgba(0, 0, 0, 0.1); /* 이전의 반투명 스타일 */
	color: #666;
	border: none;
	font-size: 14px;
	line-height: 1;
	display: flex;
	align-items: center;
	justify-content: center;
	cursor: pointer;
	transition: background 0.2s, color 0.2s;
	z-index: 10;
}

/* 호버 시에는 삭제 느낌이 나도록 빨간색으로 변경되는 이전 로직 유지 */
.btn-delete-memo:hover {
	background-color: #dc3545 !important;
	color: white !important;
}

/* 다크모드일 때 삭제 버튼이 너무 안 보일 수 있으니 대비감 살짝 조정 */
[data-coreui-theme="dark"] .btn-delete-memo {
	background-color: rgba(255, 255, 255, 0.2);
	color: #eee;
}
</style>
<meta name="_csrf" th:content="${_csrf?.token}" />
<meta name="_csrf_header" th:content="${_csrf?.headerName}" />
</head>

<body>

	<div class="container-fluid">
		<h2 class="mb-4 fw-bold">📊 대시보드</h2>

		<div id="dashboardGrid" class="dashboard-grid">


			<div class="dashboard-item" data-id="projects">
				<div class="section-box border-top border-primary border-4">
					<div class="section-title text-primary">
						<span><i class="cil-folder-open"></i> 프로젝트</span>
					</div>
					<div class="section-content" id="content-projects">
						<div th:if="${#lists.isEmpty(list.projects)}"
							class="alert alert-light text-center">데이터가 없습니다.</div>
						<div class="row g-3" th:unless="${#lists.isEmpty(list.projects)}">
							<div class="col-md-6 page-item-projects"
								th:each="p : ${list.projects}">
								<div class="card border-0 shadow-sm h-100 bg-light"
									th:data-code="${p.projectCode}"
									onclick="goToProjectInfo(this.getAttribute('data-code'))"
									style="cursor: pointer;">
									<div class="card-body p-3">
										<h6 class="fw-bold mb-0 text-truncate"
											th:text="${p.projectName}">프로젝트명</h6>
									</div>
								</div>
							</div>
						</div>
					</div>
					<div class="widget-pagination" id="pager-projects"></div>
				</div>
			</div>

			<div class="dashboard-item" data-id="notices">
				<div class="section-box border-top border-warning border-4">
					<div class="section-title text-warning">
						<span><i class="cil-bullhorn"></i> 공지사항</span>

						<button sec:authorize="hasRole('ROLE_ADMIN')"
							class="btn btn-sm btn-warning text-dark fw-bold"
							onclick="showNoticeAddModal()">+ 등록</button>
					</div>
					<div class="section-content" id="content-notices">
						<div th:if="${#lists.isEmpty(list.notices)}"
							class="alert alert-light text-center">데이터가 없습니다.</div>
						<ul class="list-group list-group-flush"
							th:unless="${#lists.isEmpty(list.notices)}">
							<li
								class="list-group-item d-flex justify-content-between align-items-center px-2 bg-transparent page-item-notices notice-row"
								th:each="n : ${list.notices}"
								th:onclick="showNoticeEditModal([[${n.noticeNo}]])"><span
								class="text-truncate" th:text="${n.title}"
								style="max-width: 70%;">공지제목</span> <span class="date-badge"
								th:text="${#temporals.format(n.addDate, 'yyyy-MM-dd')}">2026-02-24</span>
							</li>
						</ul>
					</div>
					<div class="widget-pagination" id="pager-notices"></div>
				</div>
			</div>

			<div class="dashboard-item" data-id="memos">
				<div class="section-box border-top border-success border-4">
					<div class="section-title text-success">
						<span><i class="cil-note-add"></i> 메모</span>
						<button class="btn btn-sm btn-success" onclick="showMemoForm()">+
							추가</button>
					</div>

					<div class="section-content" id="content-memos">
						<div id="memoInputForm"
							class="card mb-3 border-success shadow-sm hidden-item">
							<div class="card-body p-3">
								<textarea id="memoTextarea" class="form-control mb-2" rows="3"
									placeholder="메모를 입력하세요..." style="resize: none;"></textarea>
								<div class="text-end">
									<button class="btn btn-sm btn-light me-1"
										onclick="hideMemoForm()">취소</button>
									<button class="btn btn-sm btn-success" onclick="saveMemo()">저장</button>
								</div>
							</div>
						</div>

						<div th:if="${#lists.isEmpty(list.memos)}" id="noMemoMsg"
							class="alert alert-light text-center" style="cursor: pointer;"
							onclick="showMemoForm()">데이터가 없습니다. (클릭하여 추가)</div>

						<div class="row g-3" id="memoList">
							<div class="col-6 page-item-memos"
								th:each="m, stat : ${list.memos}">
								<div
									th:class="'card memo-card shadow-sm h-100 memo-bg-' + ${ (stat.index % 4) + 1 }"
									th:data-content="${m.content}"
									onclick="viewMemoDetail(this.getAttribute('data-content'))">
									<button class="btn-delete-memo"
										th:onclick="deleteMemo([[${m.memoNo}]], event)" title="삭제">&times;</button>
									<div class="card-body py-3">
										<p class="mb-0 memo-content-preview" th:text="${m.content}">메모
											내용</p>
									</div>
								</div>
							</div>
						</div>
					</div>
					<div class="widget-pagination" id="pager-memos"></div>
				</div>
			</div>

			<div class="dashboard-item" data-id="stats">
				<div class="section-box border-top border-info border-4">
					<div class="section-title text-info">
						<span><i class="cil-chart"></i> 일감 통합 현황</span>
						<div class="form-check form-switch mb-0"
							style="font-size: 0.9rem;">
							<input class="form-check-input" type="checkbox"
								id="dashShowOnlyMe" onchange="loadDashboardIssues()"> <label
								class="form-check-label text-muted" for="dashShowOnlyMe">내
								것만</label>
						</div>
					</div>
					<div class="section-content">
						<div class="mb-3">
							<select id="dashProjectSelect" class="form-select form-select-sm"
								onchange="loadDashboardIssues()">
								<option value="all">모든 프로젝트 (전체 보기)</option>
								<th:block th:each="p : ${list.projects}">
									<option th:value="${p.projectCode}" th:text="${p.projectName}"></option>
								</th:block>
							</select>
						</div>

						<div id="dash-issue-list"
							class="list-group list-group-flush small">
							<p class="text-center text-muted py-4">일감을 불러오는 중...</p>
						</div>
					</div>
				</div>
			</div>
		</div>
	</div>

	<div class="modal fade" id="noticeModal" tabindex="-1"
		aria-hidden="true">
		<div class="modal-dialog modal-lg modal-dialog-centered">
			<div class="modal-content border-0 shadow-lg">
				<form id="noticeForm" enctype="multipart/form-data">
					<div class="modal-header bg-warning text-dark">
						<h5 class="modal-title fw-bold" id="noticeModalLabel">공지사항 상세</h5>
						<button type="button" class="btn-close" data-bs-dismiss="modal"></button>
					</div>
					<div class="modal-body p-4">
						<input type="hidden" id="noticeId" name="noticeNo">
						<div class="mb-3">
							<label class="form-label fw-bold">제목</label> <input type="text"
								id="noticeTitle" name="title" class="form-control" required>
						</div>
						<div class="mb-3">
							<label class="form-label fw-bold">공개 설정</label> <select
								id="noticePrivacy" name="privacySettings" class="form-select">
								<option value="1">전체 공개</option>
								<option value="0">비공개</option>
							</select>
						</div>
						<div class="mb-3">
							<label class="form-label fw-bold">내용</label>
							<textarea id="noticeContent" name="content" class="form-control"
								rows="6" style="resize: none;" required></textarea>
						</div>
						<div class="mb-3">
							<label class="form-label fw-bold"><i
								class="cil-paperclip"></i> 첨부파일</label> <input type="file"
								id="noticeFiles" name="uploadFiles" class="form-control"
								multiple>
							<div id="existingFileList" class="mt-2 small text-muted"></div>
						</div>
					</div>
					<div class="modal-footer bg-light">
						<button sec:authorize="hasRole('ROLE_ADMIN')" type="button"
							class="btn btn-danger me-auto" id="btnDeleteNotice"
							onclick="handleDeleteNotice()">삭제</button>

						<button type="button" class="btn btn-secondary"
							data-bs-dismiss="modal">닫기</button>

						<button sec:authorize="hasRole('ROLE_ADMIN')" type="submit"
							class="btn btn-warning text-dark fw-bold">저장</button>
					</div>
				</form>
			</div>
		</div>
	</div>

	<div class="modal fade" id="memoDetailModal" tabindex="-1"
		aria-hidden="true">
		<div class="modal-dialog modal-dialog-centered">
			<div class="modal-content border-0 shadow-lg">
				<div class="modal-header bg-success text-white">
					<h5 class="modal-title fw-bold">메모 상세</h5>
					<button type="button" class="btn-close btn-close-white"
						data-bs-dismiss="modal"></button>
				</div>
				<div class="modal-body p-4">
					<div id="fullMemoContent"
						style="white-space: pre-wrap; line-height: 1.6;"></div>
				</div>
			</div>
		</div>
	</div>

	<div class="modal fade" id="confirmModal" tabindex="-1"
		aria-hidden="true">
		<div class="modal-dialog modal-dialog-centered">
			<div class="modal-content border-0 shadow">
				<div class="modal-header bg-danger text-white">
					<h5 class="modal-title">
						<i class="cil-warning me-2"></i>작업 확인
					</h5>
					<button type="button" class="btn-close btn-close-white"
						data-coreui-dismiss="modal"></button>
				</div>
				<div class="modal-body p-4 text-center">
					<p id="confirmModalMessage" class="fs-5 mb-0"></p>
				</div>
				<div class="modal-footer bg-light border-0">
					<button type="button" class="btn btn-secondary"
						data-coreui-dismiss="modal">취소</button>
					<button type="button" class="btn btn-danger px-4"
						id="btnConfirmExecute">확인</button>
				</div>
			</div>
		</div>
	</div>

	<div class="toast-container position-fixed bottom-0 end-0 p-3"
		style="z-index: 9999;">
		<div id="pmsToast" class="toast hide" role="alert"
			aria-live="assertive" aria-atomic="true">
			<div class="toast-header text-white" id="toastHeader">
				<strong class="me-auto" id="toastTitle">알림</strong>
				<button type="button" class="btn-close btn-close-white"
					data-coreui-dismiss="toast"></button>
			</div>
			<div class="toast-body" id="toastBody"></div>
		</div>
	</div>

<script th:inline="javascript">
    // 1. 전역 변수 설정
    const isAdmin = /*[[${#authorization.expression('hasRole("ROLE_ADMIN")')}]]*/ false;
    let confirmModal;
    let pmsToast;
    let confirmCallback = null;

    // --- [공통 유틸리티 함수] ---
    
    // ✅ 토스트 표시 함수
    function showToast(message, type = 'success') {
        const pmsToastElement = document.getElementById('pmsToast');
        if (!pmsToastElement) return;

        const header = $('#toastHeader');
        const title = $('#toastTitle');
        const body = $('#toastBody');

        header.removeClass('bg-success bg-danger').addClass(type === 'success' ? 'bg-success' : 'bg-danger');
        title.text(type === 'success' ? '성공' : '알림');
        body.text(message);

        if (!pmsToast) pmsToast = new coreui.Toast(pmsToastElement);
        pmsToast.show();
    }

    // ✅ 저장소에 알림 예약 (새로고침 후 표시용)
    function reserveToast(message, type = 'success') {
        const toastData = { message, type };
        sessionStorage.setItem('pendingToast', JSON.stringify(toastData));
    }

    // 커스텀 확인 모달 표시
    function askConfirm(message, callback) {
        $('#confirmModalMessage').text(message);
        confirmCallback = callback;
        confirmModal.show();
    }

    const getCsrf = () => {
        const token = document.querySelector('meta[name="_csrf"]')?.content;
        const header = document.querySelector('meta[name="_csrf_header"]')?.content;
        return (token && header) ? { token, header } : null;
    };

    $(document).ready(function () {
        // CoreUI 객체 초기화
        confirmModal = new coreui.Modal(document.getElementById('confirmModal'));
        
        // 확인 모달의 '확인' 버튼 이벤트 바인딩
        $('#btnConfirmExecute').on('click', function() {
            if (confirmCallback) { confirmCallback(); confirmCallback = null; }
            confirmModal.hide();
        });

        // 📍 [중요] 페이지 로드 시 예약된 토스트가 있는지 확인
        const pendingToast = sessionStorage.getItem('pendingToast');
        if (pendingToast) {
            const { message, type } = JSON.parse(pendingToast);
            showToast(message, type);
            sessionStorage.removeItem('pendingToast'); // 표시 후 삭제
        }

        // 위젯 드래그 정렬 (기존 동일)
        const grid = document.getElementById("dashboardGrid");
        if (grid) {
            new Sortable(grid, {
                animation: 250, 
                handle: ".section-title",
                ghostClass: "drag-ghost",
                onEnd: () => {
                    const order = Array.from(document.querySelectorAll(".dashboard-item")).map(el => el.dataset.id);
                    localStorage.setItem("dashboardOrder", JSON.stringify(order));
                }
            });
            const saved = JSON.parse(localStorage.getItem("dashboardOrder"));
            if (saved) saved.forEach(id => { 
                const el = document.querySelector(`.dashboard-item[data-id="${id}"]`); 
                if (el) grid.appendChild(el); 
            });
        }
        
        $('.hidden-item:not(#memoInputForm)').removeClass('hidden-item');
        loadDashboardIssues();
    });

    /* --- [공지사항 로직] --- */
    function showNoticeAddModal() {
        document.getElementById('noticeForm').reset();
        document.getElementById('noticeId').value = '';
        document.getElementById('noticeModalLabel').innerText = '공지사항 등록';
        $('#btnDeleteNotice').hide();
        $('#existingFileList').empty();
        $('#noticeForm input, #noticeForm textarea, #noticeForm select').prop('disabled', false).prop('readonly', false);
        new bootstrap.Modal(document.getElementById('noticeModal')).show();
    }

    async function showNoticeEditModal(noticeNo) {
        try {
            const res = await fetch(`/api/notices/${noticeNo}`);
            const data = await res.json();
            document.getElementById('noticeId').value = data.noticeNo;
            document.getElementById('noticeTitle').value = data.title;
            document.getElementById('noticeContent').value = data.content;
            document.getElementById('noticePrivacy').value = data.privacySettings;
            $('#btnDeleteNotice').toggle(isAdmin);
            
            const fileListDiv = $('#existingFileList').empty();
            if (data.files?.length > 0) {
                let fileHtml = '<p class="fw-bold mb-1 small mt-2">기존 첨부파일:</p><ul class="list-group list-group-sm mb-3">';
                data.files.forEach(file => {
                    fileHtml += `
                        <li class="list-group-item d-flex justify-content-between align-items-center py-2">
                            <div class="text-truncate" style="max-width: 85%;">
                                <i class="cil-file text-primary me-2"></i> 
                                <a href="/download/${file.detailsNo}" class="text-decoration-none small text-dark fw-semibold">${file.filesName}</a>
                            </div>
                            ${isAdmin ? `<button type="button" class="btn btn-sm btn-outline-danger border-0" onclick="deleteIndividualFile(${file.detailsNo}, this)">&times;</button>` : ''}
                        </li>`;
                });
                fileListDiv.append(fileHtml + '</ul>');
            }
            $('#noticeForm input, #noticeForm textarea, #noticeForm select').prop('disabled', !isAdmin).prop('readonly', !isAdmin);
            new bootstrap.Modal(document.getElementById('noticeModal')).show();
        } catch (e) { showToast("데이터 로딩 실패", "error"); }
    }

    function handleDeleteNotice() {
        const noticeNo = document.getElementById('noticeId').value;
        askConfirm("이 공지사항을 정말 삭제하시겠습니까?", async () => {
            const csrf = getCsrf();
            const headers = {};
            if (csrf) headers[csrf.header] = csrf.token;

            const res = await fetch(`/api/notices/${noticeNo}`, { method: 'DELETE', headers: headers });
            if (res.ok) { 
                reserveToast("공지사항이 삭제되었습니다."); 
                location.reload(); 
            } else showToast("삭제 실패", "error");
        });
    }

    document.getElementById('noticeForm').onsubmit = async function(e) {
        e.preventDefault();
        const id = document.getElementById('noticeId').value;
        const csrf = getCsrf();
        const formData = new FormData(this);
        const url = id ? `/api/notices/${id}` : '/api/notices';
        const headers = {};
        if (csrf) headers[csrf.header] = csrf.token;

        try {
            const res = await fetch(url, { method: id ? 'PUT' : 'POST', headers: headers, body: formData });
            if (res.ok) { 
                reserveToast("저장되었습니다."); 
                location.reload(); 
            } else showToast("저장 실패", "error");
        } catch (error) { showToast("네트워크 오류", "error"); }
    };

    /* --- [메모 로직] --- */
    function showMemoForm() { 
        $('#memoInputForm').removeClass('hidden-item'); 
        $('#noMemoMsg').addClass('hidden-item'); 
        $('#memoTextarea').focus(); 
    }
    function hideMemoForm() { 
        $('#memoInputForm').addClass('hidden-item'); 
        $('#memoTextarea').val(''); 
        $('#noMemoMsg').removeClass('hidden-item');
    }

    function saveMemo() {
        const content = $('#memoTextarea').val().trim();
        if (!content) return;
        const csrf = getCsrf();
        const headers = { 'Content-Type': 'application/json' };
        if (csrf) headers[csrf.header] = csrf.token;

        fetch('/api/memos', { method: 'POST', headers: headers, body: JSON.stringify({ content }) }).then(res => {
            if(res.ok) { 
                reserveToast("메모가 저장되었습니다."); 
                location.reload(); 
            }
        });
    }

    function deleteMemo(memoNo, event) {
        if (event) event.stopPropagation();
        askConfirm("이 메모를 정말 삭제하시겠습니까?", () => {
            const csrf = getCsrf();
            const headers = {};
            if (csrf) headers[csrf.header] = csrf.token;

            fetch(`/api/memos/${memoNo}`, { method: 'DELETE', headers: headers }).then(res => {
                if(res.ok) { 
                    reserveToast("메모가 삭제되었습니다."); 
                    location.reload(); 
                } else showToast("삭제 오류", "error");
            });
        });
    }

    function viewMemoDetail(content) { 
        document.getElementById('fullMemoContent').innerText = content; 
        new bootstrap.Modal(document.getElementById('memoDetailModal')).show(); 
    }

    /* --- [일감 현황 로직] --- */
    async function loadDashboardIssues() {
        const selectEl = document.getElementById('dashProjectSelect');
        const projectCode = selectEl ? selectEl.value : 'all'; 
        const isOnlyMe = document.getElementById('dashShowOnlyMe').checked ? 'Y' : 'N';
        const listContainer = document.getElementById('dash-issue-list');

        try {
            const response = await fetch(`/api/dashboard/${projectCode}/issues?showOnlyMe=${isOnlyMe}`);
            const issues = await response.json();
            listContainer.innerHTML = '';
            if (issues.length === 0) {
                listContainer.innerHTML = '<div class="text-center text-muted py-4">해당하는 일감이 없습니다.</div>';
                return;
            }
            issues.forEach(issue => {
                let badgeColor = issue.priorityName === '긴급' ? 'bg-danger' : (issue.priorityName === '높음' ? 'bg-warning text-dark' : 'bg-info');
                listContainer.insertAdjacentHTML('beforeend', `
                    <div class="list-group-item px-0 py-2 border-bottom" style="cursor:pointer;" onclick="location.href='/project/user/${issue.projectCode}/issue/info?jobNo=${issue.jobNo}'">
                        <div class="d-flex justify-content-between align-items-center">
                            <div class="text-truncate" style="max-width: 80%;">
                                <small class="text-muted">#${issue.jobNo}</small>
                                <span class="fw-bold d-block" style="font-size: 0.85rem;">${issue.title}</span>
                            </div>
                            <span class="badge ${badgeColor}" style="font-size: 0.7rem;">${issue.priorityName}</span>
                        </div>
                    </div>`);
            });
        } catch (error) { listContainer.innerHTML = '<div class="text-center text-danger py-4">데이터 로딩 에러</div>'; }
    }

    function goToProjectInfo(projectCode) { location.href = `/project/user/${projectCode}/read`; }
</script>
