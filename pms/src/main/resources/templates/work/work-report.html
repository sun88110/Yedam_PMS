<!doctype html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org/"
	xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
	layout:decorate="~{common/layouts/default-layout}"
	layout:fragment="Content">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<!-- Bootstrap5 icon사용 -->
<link rel="stylesheet"
	href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" />
<link rel="stylesheet"
	href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap-datepicker/1.10.0/css/bootstrap-datepicker.min.css" />

<!-- 1. jQuery = JavaScript 라이브러리-->
<script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
<!-- 2. bootstrap-datepicker 본체 -->
<script
	src="https://cdnjs.cloudflare.com/ajax/libs/bootstrap-datepicker/1.10.0/js/bootstrap-datepicker.min.js"></script>
<!-- 3. 한국어 캘린더-->
<script
	src="https://cdnjs.cloudflare.com/ajax/libs/bootstrap-datepicker/1.10.0/locales/bootstrap-datepicker.ko.min.js"></script>

<title>소요시간 보고서</title>
</head>
<body> 
	<div class="container">
		<div class="mb-4 mt-3">
			<h3 class="fw-bold">
				<span th:text="${project.projectName}" class="text-primary"></span>
				<small class="text-muted">의 보고서 목록</small>
			</h3>
		</div>

		<!-- 검색조건  form-->
		<form th:action="@{/project/user/{projectCode}/issue/work/report/list/read(projectCode=${projectCode})}"
				  method="get" 
				  id="reportSearchForm">
			<!-- 검색조건 입력 영역 -->
			<div id="dynamicReportSearch" class="row g-3 mb-3">
				<div th:replace="~{common/fragments/work/dynamic-work-report-search}"></div>
			</div>

			<!-- dropdown 영역 -->
			<div class="mb-3 d-flex align-items-stretch justify-content-end gap-2">
				<div class="dropdown me-2">
					<button class="btn btn-primary dropdown-toggle" 
								 type="button"
								 data-bs-toggle="dropdown">검색조건 추가</button>
					<ul class="dropdown-menu">
						<li><a class="dropdown-item add-condition" href="#"
									data-target="field-job">일감별</a></li>
						<li><a class="dropdown-item add-condition" href="#"
									data-target="field-username">담당자별</a></li>
						<li><a class="dropdown-item add-condition" href="#"
									data-target="field-workType">작업분류별</a></li>
						<li><a class="dropdown-item add-condition" href="#"
									data-target="field-projectWeek">프로젝트 주별</a></li>
						<li><a class="dropdown-item add-condition" href="#"
									data-target="field-projectMonth">프로젝트 월별</a></li>
					</ul>
				</div>
				<!-- 조회 버튼 -->
				<button type="submit" class="btn btn-primary">보고서 조회</button>
				<!-- 소요시간 조회로 이동-->
				<a th:href="@{/project/user/{projectCode}/issue/work/list/read(projectCode=${projectCode})}"
					 class="btn btn-primary d-inline-flex align-items-center justify-content-center">소요시간 조회</a>
			</div>
		</form>
		<!-- 보고서로 조회되는 테이블 -->
		<div class="mt-4">
			<table class="table table-hover text-center">
				<thead>
					<tr>
						<th class="bi bi-person-badge me-1">담당자</th>
						<th class="bi bi-card-checklist me-1">일감</th>
						<th class="bi bi-card-checklist me-1">작업분류</th>
						<th class="bi bi-calendar-range me-1">기간</th>
						<th class="bi bi-alarm me-1">예상시간</th>
						<th class="bi bi-play0circle me-1">실제 작업시간</th>
						<th class="bi bi-graph-up me-1">진척도</th>
					</tr>
				</thead>
				<tbody>
					<tr th:each="row : ${reportList}">
						<td th:if="${row.username != null}"
							   th:text="${row.username}"></td>
						<td th:if="${row.title != null}"
							   th:text="${row.title}"
							   class="text-start"></td>	   
						<td th:if="${row.workType != null ?
											row.workType : '-'}"
							   th:text="${row.workType}"
							   class="text-start"></td>							   
						<td>
							<span th:if="${row.workWeek != null}"
									  th:text="${row.workWeek}"></span> 
							<span th:if="${row.workMonth != null}"
									  th:text="${row.workMonth}"></span>
							<span th:if="${row.workWeek == null and row.workMonth == null}"
									  th:text="${row.startDate != null and row.endDate != null} ?
													(${#dates.format(row.startDate, 'yyyy-MM-dd')} 
													+ ' ~ ' + 
													${#dates.format(row.endDate, 'yyyy-MM-dd')}) :
													'기간 정보 없음'"></span>
						</td>
						<td th:text="${row.estimatedTime ?: row.averageTime} + '시간'"></td>
						<td class="fw-bold text-primary" th:text="${row.realWorkTime} + '시간'"></td>
						<td style="width: 150px">
							<div class="progress" style="height: 10px">
								<div class="progress-bar" role="progressbar"
									th:with="total=${row.estimatedTime ?: row.averageTime ?: 1}, percent=${(row.realWorkTime * 1.0 / total) * 100}"
									th:style="'width: ' + (${percent > 100 ? 100 : percent}) + '%'"
									th:classappend="${percent > 100 ? 'bg-danger' : 'bg-success'}"></div>
							</div>
						</td>
					</tr>
				<tr th:if="${#lists.isEmpty(reportList)}">
					<td colspan="8">검색 조건을 추가하여 보고서를 조회해 주세요</td>
				</tr>
				</tbody>
			</table>
		</div>
	</div>
	<!-- script -->
	<script th:src="@{/js/work/dynamicSearch.js}"></script>
</body>
</html>
